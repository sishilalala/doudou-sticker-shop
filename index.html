<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🏷️ 豆豆贴纸奖励</title>
  <style>
    /* ===== Reset & Variables ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #7c5cbf;
      --primary-light: #a07ed6;
      --secondary: #ff6b9d;
      --gold: #e8a020;
      --gold-bg: #fff8e1;
      --green: #2d9e5a;
      --green-bg: #e6f9ee;
      --bg: #f3f0ff;
      --card-bg: #ffffff;
      --text: #2d2d2d;
      --text-muted: #888;
      --border: #e8e3ff;
      --shadow: 0 4px 18px rgba(124,92,191,0.13);
      --shadow-hover: 0 8px 30px rgba(124,92,191,0.22);
      --radius: 16px;
    }
    body {
      font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,-apple-system,sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== Header ===== */
    .app-header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: #fff;
      padding: 16px 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .app-header-title h1 { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
    .app-header-title p  { font-size: 11px; opacity: .8; margin-top: 2px; }
    .btn-sync-setup {
      background: rgba(255,255,255,.22);
      border: 1.5px solid rgba(255,255,255,.5);
      color: #fff;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }
    .btn-sync-setup:hover { background: rgba(255,255,255,.32); }
    .sync-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6deba5;
      margin-right: 4px;
      vertical-align: middle;
    }
    .sync-dot.off { background: rgba(255,255,255,.45); }

    /* ===== Tabs ===== */
    nav {
      display: flex;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .tab-btn {
      flex: 1;
      padding: 13px 8px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .2s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    /* ===== Pages ===== */
    .page { display: none; }
    .page.active { display: block; }
    .grid-wrap { padding: 14px 14px 88px; max-width: 900px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    /* ===== Card ===== */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .card:not(.card-history):hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .card-img {
      width: 100%; height: 120px;
      object-fit: cover;
      background: linear-gradient(135deg, #ede8ff, #ffe8f3);
      display: block;
    }
    .card-img-placeholder {
      width: 100%; height: 120px;
      background: linear-gradient(135deg, #ede8ff, #ffe8f3);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
    }
    .card-body { padding: 10px 10px 11px; }
    .card-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin-bottom: 6px; line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .sticker-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--gold-bg); color: var(--gold);
      font-weight: 700; font-size: 12px;
      padding: 2px 8px; border-radius: 20px;
      margin-bottom: 5px;
    }
    /* Stock / remaining quantity badge */
    .stock-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: #f0f7ff; color: #3a7bd5;
      font-weight: 600; font-size: 11px;
      padding: 2px 7px; border-radius: 20px;
      margin-bottom: 7px;
    }
    .stock-badge.low { background: #fff5f0; color: #e05a2a; }
    .btn-redeem {
      width: 100%; padding: 7px 4px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; border: none; border-radius: 8px;
      font-family: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-redeem:active { opacity: .8; }

    /* Card delete button */
    .card-wrapper { position: relative; }
    .btn-delete-card {
      position: absolute; top: 6px; right: 6px;
      width: 24px; height: 24px;
      background: rgba(0,0,0,.45);
      border: none; border-radius: 50%;
      color: #fff; font-size: 13px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
      z-index: 2;
    }
    .card-wrapper:hover .btn-delete-card { opacity: 1; }
    @media (hover: none) { .btn-delete-card { opacity: .7; } }

    /* ===== History card ===== */
    .card-history { opacity: .88; }
    .tag-redeemed {
      display: inline-block;
      background: var(--green-bg); color: var(--green);
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
      margin-bottom: 4px;
    }
    .redeemed-date { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .added-date { font-size: 10px; color: var(--text-muted); margin-top: 2px; margin-bottom: 6px; }

    /* History summary bar */
    #history-summary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #history-summary .sum-label { font-size: 13px; opacity: .88; }
    #history-summary .sum-value { font-size: 22px; font-weight: 700; letter-spacing: .5px; }

    /* ===== Empty state ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 50px 20px; color: var(--text-muted);
    }
    .empty-icon { font-size: 52px; margin-bottom: 10px; }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* ===== FAB ===== */
    #fab {
      position: fixed; bottom: 22px; right: 22px;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #fff; font-size: 30px;
      border: none; cursor: pointer;
      box-shadow: 0 4px 18px rgba(255,107,157,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 20; transition: transform .15s;
    }
    #fab:active { transform: scale(.93); }

    /* ===== Overlay + Sheet ===== */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 50;
      align-items: flex-end; justify-content: center;
      padding: 0 0 0 0;
    }
    .overlay.show { display: flex; }
    @media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } }
    .sheet {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 22px 20px 28px;
      width: 100%; max-width: 440px;
      animation: slideUp .25s ease;
      max-height: 92vh; overflow-y: auto;
    }
    @media (min-width: 600px) { .sheet { border-radius: 20px; } }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .sheet-drag { width: 40px; height: 4px; background: #e0e0e0; border-radius: 4px; margin: 0 auto 18px; }
    .sheet h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }

    /* Form */
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 11px; font-weight: 700;
      color: #666; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .form-row input[type="text"],
    .form-row input[type="number"],
    .form-row input[type="url"] {
      width: 100%; padding: 10px 12px;
      border: 2px solid var(--border); border-radius: 10px;
      font-size: 15px; outline: none;
      transition: border-color .2s;
      font-family: inherit; color: var(--text);
    }
    .form-row input:focus { border-color: var(--primary); }
    .img-toggle {
      display: flex; gap: 8px; margin-bottom: 8px;
    }
    .img-toggle-btn {
      flex: 1; padding: 7px;
      border: 2px solid var(--border); background: #fff;
      border-radius: 8px; font-family: inherit;
      font-size: 12px; font-weight: 600;
      color: #888; cursor: pointer; transition: all .15s;
    }
    .img-toggle-btn.active { border-color: var(--primary); color: var(--primary); background: #f5f3ff; }
    .file-drop-zone {
      display: block; padding: 12px 10px;
      border: 2px dashed var(--border); border-radius: 10px;
      text-align: center; font-size: 13px; color: #888;
      cursor: pointer; transition: border-color .2s;
    }
    .file-drop-zone:hover { border-color: var(--primary); }
    #inp-file { display: none; }
    #img-preview {
      width: 100%; max-height: 130px; object-fit: cover;
      border-radius: 10px; margin-top: 8px; display: none;
    }
    .sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 11px;
      border: 2px solid var(--border); background: #fff;
      border-radius: 10px; font-family: inherit;
      font-size: 14px; font-weight: 600;
      color: #666; cursor: pointer;
    }
    .btn-primary {
      flex: 2; padding: 11px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary:not(:disabled):active { opacity: .85; }

    /* Confirm sheet */
    .confirm-sheet { text-align: center; }
    .confirm-img-box {
      width: 90px; height: 90px; border-radius: 14px;
      overflow: hidden; margin: 0 auto 12px;
      background: linear-gradient(135deg, #ede8ff, #ffe8f3);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
    }
    .confirm-img-box img { width: 100%; height: 100%; object-fit: cover; }
    .confirm-item-name { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .confirm-item-cost { font-size: 14px; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
    .confirm-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }

    /* Quantity stepper */
    .qty-stepper-row {
      margin: 4px 0 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .qty-stepper {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .qty-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary); color: #fff;
      border: none; font-size: 22px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; user-select: none;
    }
    .qty-btn:disabled { opacity: .35; cursor: not-allowed; }
    .qty-btn:not(:disabled):active { opacity: .75; }
    .qty-display {
      width: 56px; text-align: center;
      font-size: 26px; font-weight: 700; color: var(--text);
    }
    .qty-remaining-label {
      font-size: 12px; color: var(--text-muted);
    }
    .qty-remaining-label strong { color: var(--primary); }

    /* Setup sheet */
    .setup-step {
      background: #f8f7ff; border-radius: 12px;
      padding: 12px 14px; margin-bottom: 10px;
    }
    .setup-step-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--primary); color: #fff;
      font-size: 11px; font-weight: 700;
      margin-right: 6px; vertical-align: middle; flex-shrink: 0;
    }
    .setup-step-title { font-weight: 600; font-size: 14px; vertical-align: middle; }
    .setup-step p { font-size: 12px; color: #666; margin-top: 6px; line-height: 1.5; }
    .setup-step a { color: var(--primary); }
    .config-textarea {
      width: 100%; height: 120px;
      border: 2px solid var(--border); border-radius: 10px;
      padding: 10px 12px; font-family: 'Menlo','Monaco','Courier New',monospace;
      font-size: 11px; resize: vertical; outline: none;
      margin-top: 8px; color: #333;
    }
    .config-textarea:focus { border-color: var(--primary); }
    .config-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .setup-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .setup-clear-btn {
      width: 100%; padding: 9px;
      border: 1.5px solid #ffcccc; background: #fff5f5;
      border-radius: 10px; color: #c0392b;
      font-family: inherit; font-size: 13px; font-weight: 600;
      cursor: pointer; margin-top: 6px;
    }

    /* Toast */
    #toast {
      position: fixed; bottom: 88px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(40,40,40,.92); color: #fff;
      padding: 9px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity .25s, transform .25s;
      z-index: 200; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      display: inline-block; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Ledger Tab ===== */
    .balance-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      border-radius: 18px;
      padding: 18px 16px 16px;
      margin-bottom: 14px;
    }
    .balance-card-title {
      font-size: 11px; opacity: .7; margin-bottom: 12px;
      letter-spacing: .8px; text-transform: uppercase;
    }
    .balance-main {
      display: flex; align-items: flex-end; gap: 6px; margin-bottom: 14px;
    }
    .balance-main-value {
      font-size: 52px; font-weight: 800; line-height: 1; color: #ffd700;
    }
    .balance-main-unit { font-size: 16px; opacity: .75; padding-bottom: 8px; }
    .balance-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .balance-stat {
      background: rgba(255,255,255,.09); border-radius: 10px;
      padding: 8px 10px; text-align: center;
    }
    .balance-stat-value { font-size: 16px; font-weight: 700; }
    .balance-stat-label { font-size: 10px; opacity: .65; margin-top: 2px; }
    .balance-stat.earn  { color: #6deba5; }
    .balance-stat.deduct { color: #ff8a8a; }
    .balance-stat.spent  { color: #ffb347; }

    .btn-add-ledger {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; border: none; border-radius: 12px;
      font-family: inherit; font-size: 15px; font-weight: 700;
      cursor: pointer; margin-bottom: 14px; transition: opacity .15s;
    }
    .btn-add-ledger:active { opacity: .85; }

    /* Ledger list */
    .ledger-list { display: flex; flex-direction: column; gap: 8px; }
    .ledger-entry {
      background: var(--card-bg); border-radius: 12px; padding: 12px 14px;
      box-shadow: var(--shadow); display: flex; align-items: center;
      gap: 12px; position: relative;
    }
    .ledger-entry-icon {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .ledger-entry-icon.earn   { background: #e6f9ee; }
    .ledger-entry-icon.deduct { background: #fff0f0; }
    .ledger-entry-content { flex: 1; min-width: 0; }
    .ledger-entry-main {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 2px;
    }
    .ledger-entry-category { font-size: 14px; font-weight: 600; color: var(--text); }
    .ledger-entry-amount { font-size: 16px; font-weight: 800; }
    .ledger-entry-amount.earn   { color: var(--green); }
    .ledger-entry-amount.deduct { color: #e05a2a; }
    .ledger-entry-meta  { font-size: 11px; color: var(--text-muted); }
    .ledger-entry-note  { font-size: 12px; color: #888; margin-top: 3px; font-style: italic; }
    .btn-delete-ledger {
      position: absolute; top: 8px; right: 8px;
      width: 22px; height: 22px; background: rgba(0,0,0,.1);
      border: none; border-radius: 50%; color: #888; font-size: 12px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
    }
    .ledger-entry:hover .btn-delete-ledger { opacity: 1; }
    @media (hover: none) { .btn-delete-ledger { opacity: .6; } }

    /* Operator & type toggles */
    .operator-toggle, .type-toggle { display: flex; gap: 8px; }
    .operator-btn, .type-btn {
      flex: 1; padding: 9px;
      border: 2px solid var(--border); background: #fff;
      border-radius: 10px; font-family: inherit;
      font-size: 14px; font-weight: 600;
      color: #888; cursor: pointer; transition: all .15s;
    }
    .operator-btn.active { border-color: var(--primary); color: var(--primary); background: #f5f3ff; }
    .type-btn.earn.active   { border-color: var(--green);  color: var(--green);  background: var(--green-bg); }
    .type-btn.deduct.active { border-color: #e05a2a; color: #e05a2a; background: #fff5f0; }

    /* Category chips */
    .category-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .chip {
      padding: 5px 11px;
      border: 1.5px solid var(--border); background: #fff;
      border-radius: 20px; font-family: inherit;
      font-size: 12px; font-weight: 500;
      color: #555; cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .chip.active {
      border-color: var(--primary); color: var(--primary);
      background: #f5f3ff; font-weight: 700;
    }
  </style>
</head>
<body>

<!-- ===== Header ===== -->
<header class="app-header">
  <div class="app-header-title">
    <h1>🏷️ 豆豆贴纸奖励</h1>
    <p>记录贴纸 · 积累 · 兑换好礼物</p>
  </div>
  <button class="btn-sync-setup" id="btn-sync" onclick="openSetupModal()">
    <span class="sync-dot off" id="sync-dot"></span>
    <span id="sync-label">云同步</span>
  </button>
</header>

<!-- ===== Tabs ===== -->
<nav>
  <button class="tab-btn active" id="tab-catalog" onclick="switchTab('catalog')">🎁 兑换商店</button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')">📋 兑换历史</button>
  <button class="tab-btn" id="tab-ledger"  onclick="switchTab('ledger')">🏷️ 贴纸账本</button>
</nav>

<!-- ===== Catalog Page ===== -->
<div id="page-catalog" class="page active">
  <div class="grid-wrap">
    <div id="catalog-grid" class="grid"></div>
  </div>
</div>

<!-- ===== History Page ===== -->
<div id="page-history" class="page">
  <div class="grid-wrap">
    <div id="history-summary" style="display:none"></div>
    <div id="history-grid" class="grid"></div>
  </div>
</div>

<!-- ===== Ledger Page ===== -->
<div id="page-ledger" class="page">
  <div class="grid-wrap">
    <div id="ledger-balance-card" class="balance-card"></div>
    <button class="btn-add-ledger" onclick="openLedgerModal()">✏️ 添加贴纸记录</button>
    <div id="ledger-list" class="ledger-list"></div>
  </div>
</div>

<!-- ===== FAB ===== -->
<button id="fab" onclick="openAddModal()" title="添加新商品">＋</button>

<!-- ===== Add Item Modal ===== -->
<div class="overlay" id="overlay-add" onclick="overlayClick(event,'add')">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <h2>✨ 添加新商品</h2>
    <div class="form-row">
      <label>商品名称 *</label>
      <input type="text" id="inp-name" placeholder="例如：乐高积木套装" />
    </div>
    <div class="form-row">
      <label>所需贴纸数量 *</label>
      <input type="number" id="inp-stickers" placeholder="例如：10" min="1" step="1" />
    </div>
    <div class="form-row">
      <label>库存数量（共几个）</label>
      <input type="number" id="inp-quantity" placeholder="例如：5，留空默认为 1" min="1" step="1" />
    </div>
    <div class="form-row">
      <label>商品图片（可选）</label>
      <div class="img-toggle">
        <button class="img-toggle-btn active" id="btn-type-url" onclick="setImgType('url')">🔗 网络链接</button>
        <button class="img-toggle-btn" id="btn-type-upload" onclick="setImgType('upload')">📷 本地图片</button>
      </div>
      <div id="sec-url">

/* ============================================================

function rowToItem(row) {
  return {
    id: row.id, name: row.name, stickers: row.stickers,
    quantity: row.quantity ?? 1,
    imageUrl: row.image_url, imageData: row.image_data,

function itemToRow(item) {

    id: item.id, name: item.name, stickers: item.stickers,
    quantity: item.quantity ?? 1,
    image_url: item.imageUrl || null, image_data: item.imageData || null,
    created_at: item.createdAt

function histToRow(entry) {
  return {
    id: entry.id, name: entry.name, stickers: entry.stickers,
    redeemed_qty: entry.redeemedQty ?? 1,
    image_url: entry.imageUrl || null, image_data: entry.imageData || null,
    created_at: entry.createdAt, redeemed_at: entry.redeemedAt
  };
}

function tryInitSupabase() {
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    loadFromSupabase();
    loadLedgerFromSupabase();
    subscribeSupabase();
    setSyncIndicator(true);
    return true;
  } catch(e) {
    console.warn('Supabase init failed', e);
    setSyncIndicator(false);
    return false;
  }
}

async function loadFromSupabase() {
  const [r1, r2] = await Promise.all([
    sbClient.from('sticker_items').select('*').order('created_at'),
    sbClient.from('sticker_history').select('*').order('redeemed_at')
  ]);
  if (!r2.error) { history = (r2.data || []).map(rowToItem); renderHistory(); }
  if (!r1.error) {
    const sbItems = (r1.data || []).map(rowToItem);
    const sbIds   = new Set(sbItems.map(i => i.id));
    // Also exclude seed IDs already in history (old-code redeems used same ID in history)
    const histIds = new Set((r2.data || []).map(r => r.id));
    const missing = SEED_ITEMS.filter(i => !sbIds.has(i.id) && !histIds.has(i.id));
    if (missing.length > 0) {
      // Prefer locally-saved version (preserves quantity updates) over raw seed defaults
      const localSaved = JSON.parse(localStorage.getItem('s_items') || '[]');
      const localById  = Object.fromEntries(localSaved.map(i => [i.id, i]));
      const missingWithLocal = missing.map(i => localById[i.id] || i);
      sbClient.from('sticker_items').upsert(missingWithLocal.map(itemToRow)); // fire and forget
      items = [...sbItems, ...missingWithLocal];
    } else {
      items = sbItems;
    }
    renderCatalog();
  }
}

function subscribeSupabase() {
  if (sbChannel) sbChannel.unsubscribe();
  sbChannel = sbClient.channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sticker_items' },   () => loadFromSupabase())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sticker_history' }, () => loadFromSupabase())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sticker_ledger' },  () => loadLedgerFromSupabase())
    .subscribe();
}

function isSupabaseMode() { return !!sbClient; }

function setSyncIndicator(on) {
  document.getElementById('sync-dot').className = 'sync-dot' + (on ? '' : ' off');
  document.getElementById('sync-label').textContent = on ? '已同步' : '云同步';

/* ============================================================
   Local Storage
============================================================ */
function loadLocal() {
  try {
    items   = JSON.parse(localStorage.getItem('s_items')   || '[]');
    history = JSON.parse(localStorage.getItem('s_history') || '[]');
    ledger  = JSON.parse(localStorage.getItem('s_ledger')  || '[]');
  } catch(e) { items = []; history = []; ledger = []; }
}
function saveLocal() {
  localStorage.setItem('s_items',   JSON.stringify(items));
  localStorage.setItem('s_history', JSON.stringify(history));
  localStorage.setItem('s_ledger',  JSON.stringify(ledger));
}

/* ============================================================
   CRUD
============================================================ */
async function addItem(item) {
  if (isSupabaseMode()) {
    const { error } = await sbClient.from('sticker_items').upsert(itemToRow(item));
    if (error) { showToast('❌ 添加失败，请重试'); throw error; }
  } else {
    items.push(item);
    saveLocal();
    renderCatalog();
  }
}

async function removeItem(id) {
  if (isSupabaseMode()) {
    const { error } = await sbClient.from('sticker_items').delete().eq('id', id);
    if (error) { showToast('❌ 删除失败，请重试'); return; }
  } else {
    items = items.filter(i => i.id !== id);
    saveLocal();
    renderCatalog();
  }
}

async function redeemItem(id, qty) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  const remaining = (item.quantity ?? 1) - qty;

  // Always create a history entry for this redemption
  const histEntry = {
    id: genId(),
    name: item.name,
    stickers: item.stickers,
    redeemedQty: qty,
    imageUrl: item.imageUrl,
    imageData: item.imageData,
    createdAt: item.createdAt,
    redeemedAt: Date.now()
  };

  if (isSupabaseMode()) {
    // Optimistic local update — UI responds immediately
    history.push(histEntry);
    item.quantity = Math.max(0, remaining);
    saveLocal();
    renderCatalog();
    renderHistory();

    // STEP 1: INSERT history FIRST (the critical record)
    const histRow = histToRow(histEntry);
    let { error: histErr } = await sbClient.from('sticker_history').insert(histRow);
    if (histErr) {
      // Fallback without redeemed_qty column
      const fallback = { ...histRow };
      delete fallback.redeemed_qty;
      ({ error: histErr } = await sbClient.from('sticker_history').insert(fallback));
    }
    if (histErr) {
      // Rollback optimistic update — history insert failed
      history = history.filter(h => h.id !== histEntry.id);
      item.quantity = (item.quantity ?? 0) + qty;
      saveLocal();
      renderCatalog();
      renderHistory();
      showToast('❌ 兑换失败，请检查网络后重试');
      return;
    }

    // STEP 2: UPDATE quantity (history already recorded, so data is safe)
    const { error: qtyErr } = await sbClient.from('sticker_items')
      .update({ quantity: Math.max(0, remaining) }).eq('id', id);
    if (qtyErr) console.error('Quantity update failed:', qtyErr.message);

    // Final sync
    await loadFromSupabase();
  } else {
    history.push(histEntry);
    item.quantity = Math.max(0, remaining);
    saveLocal();
    renderCatalog();
    renderHistory();
  }
}

/* ============================================================
   Image Handling
============================================================ */
function compressImage(file, maxSide = 600, quality = 0.75) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(maxSide / img.width, maxSide / img.height, 1);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadImageToStorage(file, itemId) {
  if (!sbClient) return null;
  try {
    const path = `sticker_shop/${itemId}`;
    const { error } = await sbClient.storage.from('sticker-images').upload(path, file, { upsert: true });
    if (error) throw error;
    const { data } = sbClient.storage.from('sticker-images').getPublicUrl(path);
    return data.publicUrl;
  } catch(e) {
    console.warn('Storage upload failed', e);
    return null;
  }
}

   Render
============================================================ */
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`;
}

function imgHtml(item, placeholderEmoji = '🎁') {
  const src = item.imageData || item.imageUrl;
  if (src) {
    return `<img class="card-img" src="${escHtml(src)}" alt="" loading="lazy"
              onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'card-img-placeholder',textContent:'${placeholderEmoji}'}))">`;
  }
  return `<div class="card-img-placeholder">${placeholderEmoji}</div>`;
}

function stockBadgeHtml(quantity) {
  const q = quantity ?? 1;
  if (q === 1) return '';
  const cls = q <= 2 ? 'stock-badge low' : 'stock-badge';
  return `<div class="${cls}">📦 剩余 ${q} 个</div>`;
}

function renderCatalog() {
  const grid = document.getElementById('catalog-grid');
  const visible = items.filter(i => (i.quantity ?? 1) > 0);
  if (visible.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎁</div>
      <p>还没有商品<br>点击右下角 ＋ 来添加吧！</p>
    </div>`;
    return;
  }
  grid.innerHTML = visible.map(item => `
    <div class="card-wrapper">
      <div class="card" onclick="">
        ${imgHtml(item)}
        <div class="card-body">
          <p class="card-name">${escHtml(item.name)}</p>
          <div class="sticker-badge">⭐ ${item.stickers} 张贴纸</div>
          ${stockBadgeHtml(item.quantity)}
          <p class="added-date">添加于 ${fmtDate(item.createdAt)}</p>
          <button class="btn-redeem" onclick="openConfirmModal('${item.id}')">兑 换</button>
        </div>
      </div>
      <button class="btn-delete-card" onclick="deleteItem('${item.id}')" title="删除商品">✕</button>
    </div>
  `).join('');
}

function renderHistory() {
  const grid    = document.getElementById('history-grid');
  const summary = document.getElementById('history-summary');

  if (history.length === 0) {
    summary.style.display = 'none';
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <p>还没有兑换记录</p>
    </div>`;
    return;
  }

  // Total items and stickers
  const totalItems    = history.reduce((sum, i) => sum + (i.redeemedQty ?? 1), 0);
  const totalStickers = history.reduce((sum, i) => sum + (i.stickers || 0) * (i.redeemedQty ?? 1), 0);
  summary.style.display = 'flex';
  summary.innerHTML = `
    <div>
      <div class="sum-label">🎉 共兑换 ${totalItems} 件商品</div>
    </div>
    <div style="text-align:right">
      <div class="sum-label">累计消耗贴纸</div>
      <div class="sum-value">⭐ ${totalStickers} 张</div>
    </div>`;

  const sorted = [...history].sort((a, b) => b.redeemedAt - a.redeemedAt);
  grid.innerHTML = sorted.map(item => {
    const qty = item.redeemedQty ?? 1;
    const totalCost = item.stickers * qty;
    return `
    <div class="card-wrapper">
      <div class="card card-history">
        ${imgHtml(item)}
        <div class="card-body">
          <div class="tag-redeemed">✓ 已兑换 ${qty > 1 ? qty + ' 个' : ''}</div>
          <p class="card-name">${escHtml(item.name)}</p>
          <div class="sticker-badge">⭐ ${totalCost} 张贴纸</div>
          <p class="redeemed-date">兑换于 ${fmtDate(item.redeemedAt)}</p>
          <p class="added-date">添加于 ${fmtDate(item.createdAt)}</p>
        </div>
      </div>
      <button class="btn-delete-card" onclick="deleteHistoryItem('${item.id}')" title="删除记录">✕</button>
    </div>`;
  }).join('');
}

  const p = document.getElementById('img-preview');
  p.src = data; p.style.display = 'block';
  document.getElementById('file-label').textContent = '✅ ' + file.name;

async function saveItem() {
  const name     = document.getElementById('inp-name').value.trim();
  const stickers = parseInt(document.getElementById('inp-stickers').value, 10);
  const qtyVal   = document.getElementById('inp-quantity').value.trim();
  const quantity = qtyVal ? parseInt(qtyVal, 10) : 1;
  if (!name)             { showToast('请输入商品名称'); return; }
  if (!stickers || stickers < 1) { showToast('请输入有效的贴纸数量'); return; }
  if (quantity < 1)      { showToast('库存数量至少为 1'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const id = genId();
  let imageUrl  = null;
  let imageData = null;

  if (imgType === 'url') {
    imageUrl = document.getElementById('inp-url').value.trim() || null;
  } else if (uploadedData) {
    if (isSupabaseMode()) {
      const fileInput = document.getElementById('inp-file');
      const file = fileInput.files[0];
      if (file) {
        const url = await uploadImageToStorage(file, id);
        if (url) imageUrl = url;
        else imageData = uploadedData;
      }
    } else {
      imageData = uploadedData;
    }
  }

  const item = { id, name, stickers, quantity, imageUrl, imageData, createdAt: Date.now() };
  await addItem(item);

  try {
    await addItem(item);
    closeAddModal();
    showToast('🎉 商品已添加！');
  } catch(e) {
    // error toast already shown in addItem
  } finally {
    btn.disabled = false;
    btn.textContent = '添加商品';
  }
}

  const item = history.find(i => i.id === id);
  const name = item ? `「${item.name}」` : '这条兑换记录';
  if (!confirm(`确定要删除 ${name} 的兑换记录吗？`)) return;
  if (isSupabaseMode()) {
    const { error } = await sbClient.from('sticker_history').delete().eq('id', id);
    if (error) { showToast('❌ 删除失败，请重试'); return; }
  } else {
    history = history.filter(i => i.id !== id);
    saveLocal();
    renderHistory();
  }
  showToast('记录已删除');
}

/* ============================================================
   Redeem
============================================================ */
function openConfirmModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  pendingRedeemId  = id;
  pendingRedeemQty = 1;

  const box = document.getElementById('confirm-img-box');
  const src = item.imageData || item.imageUrl;
  if (src) {
    box.innerHTML = `<img src="${escHtml(src)}" alt="" onerror="this.parentElement.innerHTML='🎁'">`;
  } else {
    box.textContent = '🎁';
  }
  document.getElementById('confirm-name').textContent = item.name;

  const qty = item.quantity ?? 1;

  // Show/hide stepper
  const stepperRow = document.getElementById('qty-stepper-row');
  if (qty > 1) {
    stepperRow.style.display = '';
    document.getElementById('qty-display').textContent = '1';
    updateConfirmCost(item, 1);
    updateStepperButtons(1, qty);
  } else {
    stepperRow.style.display = 'none';
    updateConfirmCost(item, 1);
  }

  // Update hint text
  document.getElementById('confirm-hint').textContent =
    qty <= 1 ? '兑换后将移至历史记录' : '兑换后库存将相应减少';

  showOverlay('confirm');
}

function updateConfirmCost(item, qty) {
  const totalCost = item.stickers * qty;
  document.getElementById('confirm-cost').textContent =
    qty > 1
      ? `⭐ 每个 ${item.stickers} 张 × ${qty} 个 = ${totalCost} 张贴纸`
      : `⭐ 需要 ${item.stickers} 张贴纸`;
  const remaining = (item.quantity ?? 1) - qty;
  const lbl = document.getElementById('qty-remaining-label');
  if (lbl) {
    lbl.innerHTML = remaining > 0
      ? `兑换后还剩 <strong>${remaining}</strong> 个`
      : `兑换后库存清零`;
  }
}

function updateStepperButtons(qty, max) {
  document.getElementById('qty-btn-minus').disabled = qty <= 1;
  document.getElementById('qty-btn-plus').disabled  = qty >= max;
}

function changeRedeemQty(delta) {
  const item = items.find(i => i.id === pendingRedeemId);
  if (!item) return;
  const max = item.quantity ?? 1;
  pendingRedeemQty = Math.max(1, Math.min(max, pendingRedeemQty + delta));
  document.getElementById('qty-display').textContent = pendingRedeemQty;
  updateConfirmCost(item, pendingRedeemQty);
  updateStepperButtons(pendingRedeemQty, max);
}

function closeConfirmModal() {
  hideOverlay('confirm');
  pendingRedeemId  = null;
  pendingRedeemQty = 1;
}

async function executeRedeem() {
  if (!pendingRedeemId) return;
  const btn = document.getElementById('btn-do-redeem');
  btn.disabled = true;
  await redeemItem(pendingRedeemId, pendingRedeemQty);
  btn.disabled = false;
  const qty = pendingRedeemQty;
  closeConfirmModal();
  showToast(qty > 1 ? `🎊 成功兑换 ${qty} 个！` : '🎊 兑换成功！已记录到历史');
}

/* ============================================================
   Overlay helpers
============================================================ */
function showOverlay(name) { document.getElementById(`overlay-${name}`).classList.add('show'); }
function hideOverlay(name) { document.getElementById(`overlay-${name}`).classList.remove('show'); }
function overlayClick(e, name) {
  if (e.target === document.getElementById(`overlay-${name}`)) {
    if (name === 'add')     closeAddModal();
    if (name === 'confirm') closeConfirmModal();
    if (name === 'setup')   closeSetupModal();
    if (name === 'ledger')  closeLedgerModal();
  }
}

/* ============================================================
   Utilities
============================================================ */
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ============================================================
   Ledger — balance helpers
============================================================ */
function calcBalance() {
  const newEarned   = ledger.filter(e => e.type === 'earn').reduce((s, e) => s + (e.stickers || 0), 0);
  const newDeducted = ledger.filter(e => e.type === 'deduct').reduce((s, e) => s + (e.stickers || 0), 0);
  const totalEarned   = HISTORICAL_EARN + newEarned;
  const totalDeducted = HISTORICAL_DEDUCT + newDeducted;
  // Count ALL redemptions: historical baseline + tracked records
  const trackedRedeemed = history.reduce((s, h) => s + (h.stickers || 0) * (h.redeemedQty ?? 1), 0);
  const totalRedeemed = HISTORICAL_REDEEM + trackedRedeemed;
  const balance = totalEarned - totalDeducted - totalRedeemed;
  return { totalEarned, totalDeducted, totalRedeemed, balance };
}

/* ============================================================
   Ledger — render
============================================================ */
function renderLedger() {
  const { totalEarned, totalDeducted, totalRedeemed, balance } = calcBalance();
  const balCard = document.getElementById('ledger-balance-card');
  if (!balCard) return;

  const balColor = balance >= 0 ? '#ffd700' : '#ff8a8a';
  balCard.innerHTML = `
    <div class="balance-card-title">🏷️ 豆豆的贴纸账本</div>
    <div class="balance-main">
      <div class="balance-main-value" style="color:${balColor}">${balance}</div>
      <div class="balance-main-unit">张 · 当前余额</div>
    </div>
    <div class="balance-stats">
      <div class="balance-stat earn">
        <div class="balance-stat-value">${totalEarned}</div>
        <div class="balance-stat-label">累计获得</div>
      </div>
      <div class="balance-stat deduct">
        <div class="balance-stat-value">${totalDeducted}</div>
        <div class="balance-stat-label">累计扣除</div>
      </div>
      <div class="balance-stat spent">
        <div class="balance-stat-value">${totalRedeemed}</div>
        <div class="balance-stat-label">累计兑换</div>
      </div>
    </div>`;

  const list = document.getElementById('ledger-list');
  if (!list) return;
  if (ledger.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📔</div>
      <p>还没有贴纸记录<br>点击上方按钮来添加！</p>
    </div>`;
    return;
  }
  const allCats = [...EARN_CATEGORIES, ...DEDUCT_CATEGORIES];
  const sorted  = [...ledger].sort((a, b) => b.createdAt - a.createdAt);
  list.innerHTML = sorted.map(entry => {
    const isEarn = entry.type === 'earn';
    const catObj = allCats.find(c => c.name === entry.category);
    const emoji  = catObj ? catObj.emoji : (isEarn ? '⭐' : '📉');
    return `
    <div class="ledger-entry">
      <div class="ledger-entry-icon ${isEarn ? 'earn' : 'deduct'}">${emoji}</div>
      <div class="ledger-entry-content">
        <div class="ledger-entry-main">
          <span class="ledger-entry-category">${escHtml(entry.category)}</span>
          <span class="ledger-entry-amount ${isEarn ? 'earn' : 'deduct'}">${isEarn ? '+' : '−'}${entry.stickers}</span>
        </div>
        <div class="ledger-entry-meta">${escHtml(entry.operator)} · ${fmtDate(entry.createdAt)}</div>
        ${entry.note ? `<div class="ledger-entry-note">${escHtml(entry.note)}</div>` : ''}
      </div>
      <button class="btn-delete-ledger" onclick="deleteLedgerEntry('${entry.id}')" title="删除">✕</button>
    </div>`;
  }).join('');
}

============================================================ */
function openLedgerModal() {

function updateOperatorUI() {

  document.getElementById('op-mom').classList.toggle('active', ledgerOperator === '妈妈');
}

function selectLedgerType(type) {
  ledgerType     = type;
  ledgerCategory = '';
  updateLedgerTypeUI();
}
function updateLedgerTypeUI() {
  document.getElementById('type-earn').classList.toggle('active',   ledgerType === 'earn');
  document.getElementById('type-deduct').classList.toggle('active', ledgerType === 'deduct');
  renderCategoryChips();
}

function renderCategoryChips() {
  const cats = ledgerType === 'earn' ? EARN_CATEGORIES : DEDUCT_CATEGORIES;
  document.getElementById('category-chips').innerHTML = cats.map(c => `
    <button class="chip ${ledgerCategory === c.name ? 'active' : ''}"
      onclick="selectCategory('${c.name}')">${c.emoji} ${c.name}</button>
  `).join('');
}

function selectCategory(name) {
  ledgerCategory = ledgerCategory === name ? '' : name;
  renderCategoryChips();
}

async function saveLedgerEntry() {
  if (!ledgerCategory) { showToast('请先选择一个分类'); return; }
  const stickers = parseInt(document.getElementById('ledger-inp-stickers').value, 10);
  if (!stickers || stickers < 1) { showToast('请输入有效的贴纸数量'); return; }
  const note = document.getElementById('ledger-inp-note').value.trim();

  const entry = {
    id: genId(), type: ledgerType, operator: ledgerOperator,
    category: ledgerCategory, stickers, note, createdAt: Date.now()
  };

  const btn = document.getElementById('btn-save-ledger');
  btn.disabled = true;

  if (isSupabaseMode()) {
    ledger.push(entry);
    saveLocal(); renderLedger();
    const { error } = await sbClient.from('sticker_ledger').insert(ledgerEntryToRow(entry));
    if (error) console.error('Ledger insert failed:', error.message);
    await loadLedgerFromSupabase();
  } else {
    ledger.push(entry);
    saveLocal(); renderLedger();
  }

  btn.disabled = false;
  closeLedgerModal();
  showToast(entry.type === 'earn' ? `⭐ 已奖励 +${stickers} 张！` : `已扣除 ${stickers} 张贴纸`);
}

async function deleteLedgerEntry(id) {
  const entry = ledger.find(e => e.id === id);
  if (!entry) return;
  const sign   = entry.type === 'earn' ? '−' : '+';
  const impact = entry.type === 'earn' ? `余额将减少 ${entry.stickers} 张` : `余额将增加 ${entry.stickers} 张`;
  if (!confirm(`确定要删除「${entry.category}」记录吗？\n删除后${impact}。`)) return;
  if (isSupabaseMode()) {
    const { error } = await sbClient.from('sticker_ledger').delete().eq('id', id);
    if (error) { showToast('❌ 删除失败，请重试'); return; }
    await loadLedgerFromSupabase();
  } else {
    ledger = ledger.filter(e => e.id !== id);
    saveLocal(); renderLedger();
  }
  showToast('记录已删除');
}

/* ============================================================
   Ledger — Supabase
============================================================ */
function ledgerRowToEntry(row) {
  return {
    id: row.id, type: row.type, operator: row.operator,
    category: row.category, stickers: row.stickers,
    note: row.note || '', createdAt: row.created_at
  };
}
function ledgerEntryToRow(entry) {
  return {
    id: entry.id, type: entry.type, operator: entry.operator,
    category: entry.category, stickers: entry.stickers,
    note: entry.note || '', created_at: entry.createdAt
  };
}

async function loadLedgerFromSupabase() {
  if (!sbClient) return;
  const { data, error } = await sbClient.from('sticker_ledger').select('*').order('created_at', { ascending: false });
  if (!error) {
    ledger = (data || []).map(ledgerRowToEntry);
    saveLocal();
    renderLedger();
  }
}
