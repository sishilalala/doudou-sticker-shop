<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>豆豆奖励兑换商店 · 积木拼盘</title>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=ZCOOL+QingKe+HuangYou&family=Ma+Shan+Zheng&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:         #FFF8E8;
    --ink:        #1C1810;
    --ink-soft:   #6B5D3F;
    --line:       #1C1810;

    /* Bento palette — 6 flavors */
    --c1: #FFD43B; /* lemon */
    --c2: #FF6B6B; /* tomato */
    --c3: #4DABF7; /* sky */
    --c4: #51CF66; /* grass */
    --c5: #B197FC; /* grape */
    --c6: #FF922B; /* tangerine */
    --c7: #FFA8A8; /* pink */
    --c8: #63E6BE; /* mint */
    --cream:#FFF4D0;

    --shadow: 0 4px 0 var(--line);
    --shadow-lg: 0 8px 0 var(--line);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:"ZCOOL KuaiLe","Baloo 2",system-ui,sans-serif;overflow-x:hidden}
  body{
    background-image:
      radial-gradient(circle at 10px 10px, rgba(28,24,16,.12) 1.5px, transparent 2px);
    background-size: 32px 32px;
    min-height:100vh;
    padding-bottom:60px;
  }

  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  img{display:block;max-width:100%}
  a{color:inherit}

  /* ============== TOP BAR ============== */
  .topbar{
    max-width:1240px;margin:0 auto;
    padding:28px 32px 12px;
    display:flex;align-items:center;gap:20px;flex-wrap:wrap;
  }
  .logo{
    display:flex;align-items:center;gap:14px;
  }
  .logo-mark{
    /* Handwritten 豆豆 wordmark */
    font-family:"Ma Shan Zheng", "ZCOOL KuaiLe", cursive;
    font-size:54px;
    line-height:1;
    color:var(--ink);
    padding:6px 18px 10px;
    background:var(--c1);
    border:3px solid var(--line);
    border-radius:22px 28px 24px 30px;
    box-shadow:var(--shadow);
    transform:rotate(-4deg);
    letter-spacing:-.04em;
    position:relative;
  }
  .logo-mark::after{
    /* tiny sticker dot accent */
    content:'';position:absolute;top:-8px;right:-8px;
    width:18px;height:18px;border-radius:50%;
    background:var(--c2);border:3px solid var(--line);
  }
  .logo-text{line-height:.95}
  .logo-text h1{
    font-family:"ZCOOL QingKe HuangYou";
    font-size:34px;letter-spacing:.02em;
    white-space:nowrap;
  }
  .logo-text .sub{font-size:14px;color:var(--ink-soft);margin-top:4px;letter-spacing:.1em}

  .topbar-spacer{flex:1}

  .sticker-wallet{
    display:flex;align-items:center;gap:10px;
    background:var(--c4);border:3px solid var(--line);
    border-radius:999px;padding:8px 20px 8px 10px;
    box-shadow:var(--shadow);
  }
  .sticker-wallet .coin{
    width:44px;height:44px;border-radius:50%;background:var(--c1);
    border:3px solid var(--line);display:grid;place-items:center;
    font-size:22px;line-height:1;
    transform:rotate(-8deg);
  }
  .sticker-wallet .count{
    font-family:"ZCOOL QingKe HuangYou";font-size:28px;line-height:1;
  }
  .sticker-wallet .count small{font-size:14px;display:block;letter-spacing:.12em;margin-top:2px}

  /* ============== TABS ============== */
  .tabs{
    max-width:1240px;margin:10px auto 0;
    padding:0 32px;
    display:flex;gap:14px;align-items:flex-end;
  }
  .tab{
    position:relative;
    font-family:"ZCOOL QingKe HuangYou";font-size:22px;
    padding:14px 28px 18px;
    border:3px solid var(--line);
    border-bottom:none;
    border-radius:20px 20px 0 0;
    background:var(--cream);color:var(--ink-soft);
    margin-bottom:-3px;
    transition:transform .15s;
    white-space:nowrap;
  }
  .tab:hover{transform:translateY(-2px)}
  .tab.active{
    background:var(--c3);color:var(--ink);
    z-index:2;padding-bottom:22px;
  }
  .tab .pip{
    display:inline-block;width:10px;height:10px;border-radius:50%;
    background:var(--line);margin-right:8px;vertical-align:2px;
  }
  .tab.active .pip{background:var(--ink)}

  /* ============== PANEL ============== */
  .panel{
    max-width:1240px;margin:0 auto;
    padding:28px;
    border:3px solid var(--line);
    background:#FFFCEA;
    border-radius:24px;
    box-shadow:var(--shadow-lg);
    min-height:600px;
  }

  /* ============== BENTO GRID ============== */
  .bento{
    display:grid;
    grid-template-columns:repeat(12,1fr);
    gap:14px;
  }
  .block{
    position:relative;
    border:3px solid var(--line);
    border-radius:22px;
    overflow:hidden;
    box-shadow:var(--shadow);
    cursor:pointer;
    transition:transform .18s cubic-bezier(.3,1.5,.6,1), box-shadow .18s;
    min-height:180px;
    display:flex;flex-direction:column;
  }
  .block:hover{
    transform:translate(-2px,-4px);
    box-shadow:0 10px 0 var(--line);
  }
  .block:active{transform:translate(0,0);box-shadow:0 2px 0 var(--line)}

  .block .img-box{
    flex:1;padding:18px;
    display:grid;place-items:center;
    background:inherit;
    position:relative;
  }
  .block .img-box::after{
    /* subtle grid dots like a lego studs plate */
    content:'';position:absolute;inset:0;
    background-image: radial-gradient(circle, rgba(28,24,16,.08) 1px, transparent 1.5px);
    background-size:18px 18px;
    pointer-events:none;
    mix-blend-mode:multiply;
  }
  .block .img-box img{
    max-height:160px;max-width:88%;
    /* transparent PNGs — drop-shadow follows the actual silhouette */
    filter:drop-shadow(3px 5px 0 rgba(28,24,16,.28));
    position:relative;z-index:1;
    transition:transform .2s;
  }
  .block:hover .img-box img{transform:scale(1.04) rotate(-1deg)}

  .block .info{
    background:var(--ink);color:#FFF8E8;
    padding:10px 14px;
    border-top:3px solid var(--line);
    display:flex;align-items:center;gap:10px;
    min-height:60px;
  }
  .block .info .name{
    flex:1;font-family:"ZCOOL KuaiLe";font-size:13px;line-height:1.25;
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    letter-spacing:.02em;
  }
  .block .price{
    flex-shrink:0;
    background:var(--c1);color:var(--ink);
    border:2px solid var(--cream);
    border-radius:999px;padding:4px 10px 4px 8px;
    font-family:"ZCOOL QingKe HuangYou";font-size:18px;
    display:flex;align-items:center;gap:6px;
    transform:rotate(3deg);
  }
  /* Sticker chip — replaces ★ with a tiny rotating sticker icon */
  .sticker-chip{
    display:inline-grid;place-items:center;
    width:22px;height:22px;border-radius:50%;
    border:2px solid var(--line);
    font-size:11px;line-height:1;
    flex-shrink:0;
    transform:rotate(var(--rot,-6deg));
  }
  .sticker-chip.s-c1{background:#FFD43B}
  .sticker-chip.s-c2{background:#FF6B6B;color:#FFF}
  .sticker-chip.s-c3{background:#4DABF7;color:#FFF}
  .sticker-chip.s-c4{background:#51CF66}
  .sticker-chip.s-c5{background:#B197FC}
  .sticker-chip.s-c6{background:#FF922B}
  .sticker-chip.s-c7{background:#FFA8A8}
  .sticker-chip.s-c8{background:#63E6BE}

  .block .stock{
    position:absolute;top:10px;right:10px;z-index:3;
    background:#FFF;border:2px solid var(--line);
    border-radius:999px;padding:3px 10px;font-size:12px;
    font-family:"Baloo 2",sans-serif;font-weight:700;
    transform:rotate(6deg);
  }
  .block .stock.out{background:var(--ink);color:#FFF8E8}

  .block .heart-btn{
    position:absolute;top:10px;left:10px;z-index:3;
    width:34px;height:34px;border-radius:50%;
    background:#FFF;border:2px solid var(--line);
    display:grid;place-items:center;
    font-size:16px;line-height:1;
    transition:transform .15s;
  }
  .block .heart-btn:hover{transform:scale(1.15) rotate(-8deg)}
  .block .heart-btn.on{background:var(--c2);color:#FFF}

  /* Block palette assignments — cycle colors by index */
  .block.c1{background:var(--c1)}
  .block.c2{background:var(--c2)}
  .block.c3{background:var(--c3)}
  .block.c4{background:var(--c4)}
  .block.c5{background:var(--c5)}
  .block.c6{background:var(--c6)}
  .block.c7{background:var(--c7)}
  .block.c8{background:var(--c8)}

  /* Varied sizes — puzzle-like */
  .block.sz-s{grid-column:span 3;min-height:220px}
  .block.sz-m{grid-column:span 4;min-height:240px}
  .block.sz-l{grid-column:span 4;min-height:280px}
  .block.sz-xl{grid-column:span 6;min-height:300px}
  .block.sz-wide{grid-column:span 6;min-height:200px}

  @media (max-width: 980px){
    .block.sz-s{grid-column:span 6}
    .block.sz-m{grid-column:span 6}
    .block.sz-l{grid-column:span 6}
    .block.sz-xl{grid-column:span 12}
    .block.sz-wide{grid-column:span 12}
  }
  @media (max-width: 520px){
    .block{grid-column:span 12 !important;min-height:220px !important}
  }

  /* Out of stock overlay */
  .block.sold-out{opacity:.7}
  .block.sold-out .img-box img{filter:grayscale(.6) drop-shadow(3px 5px 0 rgba(28,24,16,.22))}
  .block.sold-out::after{
    content:'售完啦';
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-10deg);
    background:var(--ink);color:var(--c2);
    padding:6px 20px;border:3px solid var(--c2);border-radius:10px;
    font-family:"ZCOOL QingKe HuangYou";font-size:24px;z-index:4;
    letter-spacing:.1em;
  }

  /* ============== WISHLIST SIDEBAR (sticky) ============== */
  .wishlist-fab{
    position:fixed;bottom:24px;right:24px;z-index:50;
    background:var(--c2);color:#FFF;
    border:3px solid var(--line);border-radius:20px;
    padding:14px 22px;
    box-shadow:var(--shadow-lg);
    font-family:"ZCOOL QingKe HuangYou";font-size:20px;
    display:flex;align-items:center;gap:10px;
    transition:transform .15s;
  }
  .wishlist-fab:hover{transform:translateY(-3px) rotate(-2deg)}
  .wishlist-fab .badge{
    background:#FFF;color:var(--c2);
    border:2px solid var(--line);border-radius:50%;
    width:28px;height:28px;display:grid;place-items:center;
    font-family:"Baloo 2",sans-serif;font-weight:800;font-size:14px;
  }

  .wishlist-panel{
    position:fixed;top:0;right:-440px;width:420px;max-width:100vw;
    height:100vh;background:var(--cream);
    border-left:3px solid var(--line);z-index:100;
    transition:right .3s cubic-bezier(.3,1,.3,1);
    display:flex;flex-direction:column;
  }
  .wishlist-panel.open{right:0}
  .wishlist-panel header{
    padding:24px;border-bottom:3px solid var(--line);
    background:var(--c5);
    display:flex;align-items:center;gap:14px;
  }
  .wishlist-panel header h3{font-family:"ZCOOL QingKe HuangYou";font-size:28px}
  .wishlist-panel header .close{
    margin-left:auto;width:36px;height:36px;border-radius:50%;
    background:var(--ink);color:#FFF8E8;display:grid;place-items:center;
    border:2px solid var(--line);font-size:20px;
  }
  .wishlist-panel .list{
    flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;
  }
  .wishlist-panel .empty{
    text-align:center;padding:40px 20px;color:var(--ink-soft);
    font-size:18px;
  }
  .wishlist-item{
    display:flex;align-items:center;gap:12px;
    padding:12px;background:#FFF;
    border:3px solid var(--line);border-radius:16px;
    box-shadow:var(--shadow);
    position:relative;
  }
  .wishlist-item .priority-num{
    width:32px;height:32px;border-radius:50%;
    border:2px solid var(--line);
    background:var(--c1);
    display:grid;place-items:center;
    font-family:"ZCOOL QingKe HuangYou";font-size:18px;
    flex-shrink:0;
  }
  .wishlist-item:nth-child(1) .priority-num{background:var(--c2);color:#FFF}
  .wishlist-item:nth-child(2) .priority-num{background:var(--c6)}
  .wishlist-item:nth-child(3) .priority-num{background:var(--c1)}
  .wishlist-item .thumb{
    width:48px;height:48px;border-radius:10px;
    border:2px solid var(--line);background:var(--bg);
    display:grid;place-items:center;overflow:hidden;flex-shrink:0;
  }
  .wishlist-item .thumb img{max-width:100%;max-height:100%}
  .wishlist-item .wi-info{flex:1;min-width:0}
  .wishlist-item .wi-name{font-size:14px;line-height:1.3;font-family:"ZCOOL KuaiLe";margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wishlist-item .wi-meta{font-size:12px;color:var(--ink-soft);font-family:"Baloo 2"}
  .wishlist-item .arrows{display:flex;flex-direction:column;gap:2px}
  .wishlist-item .arrows button{
    width:22px;height:18px;border:2px solid var(--line);
    background:#FFF;border-radius:6px;font-size:10px;
    display:grid;place-items:center;
  }
  .wishlist-item .arrows button:hover{background:var(--c3)}
  .wishlist-item .remove{
    width:26px;height:26px;border-radius:50%;
    background:var(--c2);color:#FFF;
    border:2px solid var(--line);display:grid;place-items:center;
    font-size:14px;
  }

  /* ============== MODAL ============== */
  .modal-backdrop{
    position:fixed;inset:0;background:rgba(28,24,16,.45);
    z-index:200;display:none;align-items:center;justify-content:center;
    padding:20px;
  }
  .modal-backdrop.open{display:flex}
  .modal{
    background:var(--cream);border:3px solid var(--line);
    border-radius:28px;box-shadow:0 10px 0 var(--line);
    max-width:480px;width:100%;
    overflow:hidden;
    animation:modalIn .25s cubic-bezier(.3,1.4,.5,1);
  }
  @keyframes modalIn{
    from{transform:translateY(40px) scale(.9);opacity:0}
    to{transform:translateY(0) scale(1);opacity:1}
  }
  .modal .m-top{
    padding:30px;background:var(--c3);
    border-bottom:3px solid var(--line);
    display:grid;place-items:center;position:relative;
    min-height:220px;
  }
  .modal .m-top::before{
    content:'';position:absolute;inset:0;
    background-image:radial-gradient(circle, rgba(28,24,16,.12) 1.5px, transparent 2px);
    background-size:22px 22px;
  }
  .modal .m-top img{
    max-height:180px;position:relative;z-index:1;
    filter:drop-shadow(4px 6px 0 rgba(28,24,16,.25));
  }
  .modal .m-body{padding:24px}
  .modal h2{font-family:"ZCOOL QingKe HuangYou";font-size:24px;line-height:1.3;margin-bottom:8px}
  .modal .price-tag{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--c1);border:3px solid var(--line);border-radius:12px;
    padding:6px 14px 6px 8px;margin-bottom:20px;
    font-family:"ZCOOL QingKe HuangYou";font-size:22px;
  }
  .modal .price-tag .sticker-chip{width:28px;height:28px;font-size:14px}
  .modal .qty-row{
    display:flex;align-items:center;gap:14px;
    padding:14px;background:#FFF;border:3px solid var(--line);border-radius:14px;
    margin-bottom:16px;
  }
  .modal .qty-row label{flex:1;font-size:16px;color:var(--ink-soft)}
  .modal .qty-ctrl{
    display:flex;align-items:center;gap:8px;
    background:var(--bg);border:2px solid var(--line);border-radius:999px;
    padding:4px;
  }
  .modal .qty-ctrl button{
    width:32px;height:32px;border-radius:50%;
    background:var(--c4);border:2px solid var(--line);
    font-family:"ZCOOL QingKe HuangYou";font-size:20px;
    line-height:1;display:grid;place-items:center;
  }
  .modal .qty-ctrl button:disabled{background:var(--ink-soft);opacity:.5;cursor:not-allowed}
  .modal .qty-ctrl .n{
    font-family:"ZCOOL QingKe HuangYou";font-size:22px;min-width:32px;text-align:center;
  }
  .modal .total-row{
    display:flex;justify-content:space-between;align-items:baseline;
    padding:14px 18px;background:var(--c1);
    border:3px solid var(--line);border-radius:14px;margin-bottom:18px;
  }
  .modal .total-row .lbl{font-size:16px;color:var(--ink)}
  .modal .total-row .val{font-family:"ZCOOL QingKe HuangYou";font-size:28px}

  .modal .m-actions{display:flex;gap:12px}
  .modal .btn{
    flex:1;padding:16px;border:3px solid var(--line);border-radius:16px;
    font-family:"ZCOOL QingKe HuangYou";font-size:22px;
    box-shadow:var(--shadow);
    transition:transform .1s, box-shadow .1s;
  }
  .modal .btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 var(--line)}
  .modal .btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--line)}
  .modal .btn.primary{background:var(--c2);color:#FFF}
  .modal .btn.ghost{background:#FFF}
  .modal .btn:disabled{background:var(--ink-soft);color:#FFF;cursor:not-allowed;box-shadow:var(--shadow)}

  /* ============== TOAST ============== */
  .toast-layer{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:300;pointer-events:none}
  .toast{
    background:var(--c4);border:3px solid var(--line);border-radius:16px;
    padding:14px 22px;box-shadow:var(--shadow);
    font-family:"ZCOOL QingKe HuangYou";font-size:20px;
    display:flex;align-items:center;gap:10px;
    animation:toastIn .3s cubic-bezier(.2,1.5,.5,1), toastOut .3s 2s forwards;
  }
  @keyframes toastIn{from{transform:translateY(-40px);opacity:0} to{transform:translateY(0);opacity:1}}
  @keyframes toastOut{to{transform:translateY(-40px);opacity:0}}

  /* Floating sticker bursts on redeem */
  .burst{position:fixed;pointer-events:none;z-index:999;font-size:32px;animation:burst 1.2s ease-out forwards}
  @keyframes burst{
    0%{transform:translate(0,0) scale(.6);opacity:1}
    100%{transform:translate(var(--dx),var(--dy)) scale(1.2) rotate(var(--r));opacity:0}
  }

  /* ============== HISTORY ============== */
  .history-grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;
  }
  .h-card{
    background:#FFF;border:3px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);
    padding:14px;display:flex;gap:14px;align-items:center;
    position:relative;
  }
  .h-card .h-thumb{
    width:70px;height:70px;border-radius:14px;border:3px solid var(--line);
    overflow:hidden;display:grid;place-items:center;flex-shrink:0;
  }
  .h-card:nth-child(6n+1) .h-thumb{background:var(--c1)}
  .h-card:nth-child(6n+2) .h-thumb{background:var(--c3)}
  .h-card:nth-child(6n+3) .h-thumb{background:var(--c4)}
  .h-card:nth-child(6n+4) .h-thumb{background:var(--c5)}
  .h-card:nth-child(6n+5) .h-thumb{background:var(--c6)}
  .h-card:nth-child(6n)   .h-thumb{background:var(--c7)}
  .h-card .h-thumb img{max-width:90%;max-height:90%}
  .h-card .h-name{font-family:"ZCOOL KuaiLe";font-size:16px;line-height:1.3;flex:1}
  .h-card .h-meta{margin-top:6px;font-size:13px;color:var(--ink-soft);font-family:"Baloo 2"}
  .h-card .h-meta .sticker-chip{width:18px;height:18px;font-size:9px;vertical-align:-3px;margin:0 2px}

  /* ============== HISTORY STATS BAR ============== */
  .h-stats{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
    margin-bottom:24px;
  }
  .h-stat{
    background:#FFF;border:3px solid var(--line);border-radius:20px;
    box-shadow:var(--shadow);padding:18px 20px;
    display:flex;align-items:center;gap:14px;
    position:relative;overflow:hidden;
  }
  .h-stat .h-stat-icon{
    width:54px;height:54px;border-radius:16px;
    border:3px solid var(--line);
    display:grid;place-items:center;font-size:28px;
    flex-shrink:0;
    transform:rotate(-5deg);
  }
  .h-stat:nth-child(1) .h-stat-icon{background:var(--c1)}
  .h-stat:nth-child(2) .h-stat-icon{background:var(--c2)}
  .h-stat:nth-child(3) .h-stat-icon{background:var(--c4)}
  .h-stat .h-stat-num{
    font-family:"ZCOOL QingKe HuangYou";font-size:36px;line-height:1;
  }
  .h-stat .h-stat-lbl{
    font-size:13px;color:var(--ink-soft);margin-top:4px;letter-spacing:.04em;
  }
  @media (max-width:680px){
    .h-stats{grid-template-columns:1fr}
  }
  .h-card .h-badge{
    position:absolute;top:-10px;right:14px;
    background:var(--ink);color:var(--c1);
    padding:4px 10px;border:2px solid var(--line);border-radius:8px;
    font-family:"ZCOOL QingKe HuangYou";font-size:16px;
    transform:rotate(4deg);
  }

<script>
/* ============ SUPABASE CONFIG ============ */
if (!window.CONFIG || !window.CONFIG.SUPABASE_URL || !window.CONFIG.SUPABASE_ANON_KEY ||
    window.CONFIG.SUPABASE_URL.includes('YOUR_PROJECT_REF')) {
  document.body.innerHTML =
    '<div style="padding:40px;font-family:system-ui,sans-serif;line-height:1.6;max-width:640px;margin:40px auto;color:#1C1810">' +
    '<h2 style="margin-bottom:12px">⚙️ 配置缺失 / Missing config</h2>' +
    '<p>请复制 <code>config.example.js</code> 为 <code>config.js</code>，填入你的 Supabase <code>URL</code> 和 <code>anon key</code>。</p>' +
    '<p>Copy <code>config.example.js</code> to <code>config.js</code> and fill in your own Supabase URL &amp; anon key.</p>' +
    '<p>详情见 <code>README.md</code>。</p>' +
    '</div>';
  throw new Error('Missing or template config.js — see README');
}
const SUPABASE_URL = window.CONFIG.SUPABASE_URL;
const SUPABASE_ANON_KEY = window.CONFIG.SUPABASE_ANON_KEY;
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ============ SUPABASE STATE I/O ============ */
let _booted = false;
let _pushing = false;
let _pendingPush = false;
let _dbItemIds = new Set();
let _dbWishIds = new Set();
let _dbRedIds  = new Set();

async function loadFromSupabase(){
  const [iRes, wRes, hRes, bRes] = await Promise.all([
    sb.from('items').select('*').order('sort_order', { ascending: true }),
    sb.from('wishlist').select('*').order('position', { ascending: true }),
    sb.from('redemptions').select('*').order('redeemed_at', { ascending: false }),
    sb.from('wallet').select('*').eq('id', 1).single(),
  ]);
  if (iRes.error) throw iRes.error;
  if (wRes.error) throw wRes.error;
  if (hRes.error) throw hRes.error;
  if (bRes.error) throw bRes.error;
  items = iRes.data.map(r => ({
    id: r.id, name: r.name, stickers: r.stickers, quantity: r.quantity, imageUrl: r.image_url,
  }));
  wishlist = wRes.data.map(r => r.item_id);
  history = hRes.data.map(r => ({
    id: r.id, itemId: r.item_id, name: r.name, stickers: r.stickers,
    redeemedQty: r.redeemed_qty, imageUrl: r.image_url,
    redeemedAt: new Date(r.redeemed_at).getTime(),
  }));
  balance = bRes.data.balance;
  pin = bRes.data.pin || '0000';
  _dbItemIds = new Set(items.map(i => i.id));
  _dbWishIds = new Set(wishlist);
  _dbRedIds  = new Set(history.map(h => h.id));
}

async function saveState(){
  if (!_booted) return;
  if (_pushing) { _pendingPush = true; return; }
  _pushing = true;
  setSyncStatus('syncing', '保存中…');
  try {
    const memItemIds = new Set(items.map(i => i.id));
    const itemDeletes = [..._dbItemIds].filter(id => !memItemIds.has(id));
    if (items.length) {
      const { error } = await sb.from('items').upsert(items.map((i, idx) => ({
        id: i.id, name: i.name, stickers: i.stickers, quantity: i.quantity,
        image_url: i.imageUrl, sort_order: idx,
      })));
      if (error) throw error;
    }
    if (itemDeletes.length) {
      const { error } = await sb.from('items').delete().in('id', itemDeletes);
      if (error) throw error;
    }
    _dbItemIds = memItemIds;

    const memWish = new Set(wishlist);
    const wishDeletes = [..._dbWishIds].filter(id => !memWish.has(id));
    if (wishDeletes.length) {
      const { error } = await sb.from('wishlist').delete().in('item_id', wishDeletes);
      if (error) throw error;
    }
    if (wishlist.length) {
      const { error } = await sb.from('wishlist').upsert(
        wishlist.map((id, idx) => ({ item_id: id, position: idx }))
      );
      if (error) throw error;
    }
    _dbWishIds = memWish;

    {
      const { error } = await sb.from('wallet').update({ balance, pin }).eq('id', 1);
      if (error) throw error;
    }

    const newRecs = history.filter(h => !_dbRedIds.has(h.id));
    if (newRecs.length) {
      const payload = newRecs.map(h => ({
        item_id: h.itemId || null,
        name: h.name, stickers: h.stickers,
        redeemed_qty: h.redeemedQty,
        image_url: h.imageUrl,
        redeemed_at: new Date(h.redeemedAt).toISOString(),
      }));
      const { data, error } = await sb.from('redemptions').insert(payload).select();
      if (error) throw error;
      data.forEach((row, i) => {
        const local = newRecs[i];
        local.id = row.id;
        _dbRedIds.add(row.id);
      });
    }

    setSyncStatus('synced', '已同步');
  } catch (e) {
    console.error('saveState failed', e);
    setSyncStatus('offline', '离线');
  } finally {
    _pushing = false;
    if (_pendingPush) { _pendingPush = false; saveState(); }
  }
}

async function uploadImageToStorage(dataUrl, id){
  const blob = await (await fetch(dataUrl)).blob();
  const path = `item_${id}.png`;
  const { error } = await sb.storage.from('item-images').upload(path, blob, {
    upsert: true, contentType: 'image/png',
  });
  if (error) throw error;
  return sb.storage.from('item-images').getPublicUrl(path).data.publicUrl;
}

let pin = '0000';

/* ============ STICKER ICONS ============ */
// Pool of sticker icons & color variants — pick one per item deterministically
const STICKER_GLYPHS = ['☺','★','♥','✿','✦','♪','☀','◉','✶','♣','✚','❉'];
const STICKER_COLORS = ['s-c1','s-c2','s-c3','s-c4','s-c5','s-c6','s-c7','s-c8'];
function stickerFor(seed, sizeClass=''){
  // Deterministic hash from string seed
  let h = 0;
  const s = String(seed);
  for (let i = 0; i < s.length; i++) h = (h*31 + s.charCodeAt(i)) >>> 0;
  const g = STICKER_GLYPHS[h % STICKER_GLYPHS.length];
  const c = STICKER_COLORS[(h >> 4) % STICKER_COLORS.length];
  const rot = ((h >> 8) % 31) - 15; // -15..+15deg
  return `<span class="sticker-chip ${c} ${sizeClass}" style="--rot:${rot}deg">${g}</span>`;
}

/* ============ STATE ============ */
let items = [], history = [], wishlist = [], balance = 0;
let currentTab = 'store';
let pendingId = null;
let pendingQty = 1;

/* ============ LAYOUT: size + color cycle ============ */
// Create a pleasing, varied bento layout for 15 items
const LAYOUT = [
  {sz:'sz-m',  c:'c1'}, // 0 - yellow
  {sz:'sz-m',  c:'c3'}, // 1 - sky
  {sz:'sz-m',  c:'c2'}, // 2 - tomato (wide top row end = 4+4+4=12)
  {sz:'sz-s',  c:'c4'}, // 3 - grass
  {sz:'sz-s',  c:'c5'}, // 4 - grape
  {sz:'sz-xl', c:'c6'}, // 5 - tangerine (xl=6, row=3+3+6=12)
  {sz:'sz-m',  c:'c7'}, // 6 - pink
  {sz:'sz-m',  c:'c8'}, // 7 - mint
  {sz:'sz-m',  c:'c1'}, // 8 - yellow
  {sz:'sz-wide',c:'c3'}, // 9 - sky wide
  {sz:'sz-s',  c:'c2'}, // 10 - tomato
  {sz:'sz-s',  c:'c4'}, // 11 - grass
  {sz:'sz-l',  c:'c5'}, // 12 - grape
  {sz:'sz-l',  c:'c6'}, // 13 - orange (4+4=8, + span 4?)
  {sz:'sz-l',  c:'c7'}, // 14 - pink
];

/* ============ RENDER STORE ============ */
function renderStore(){
  const grid = document.getElementById('bentoGrid');
  grid.innerHTML = items.map((it, idx) => {
    const L = LAYOUT[idx] || {sz:'sz-m', c:'c1'};
    const inWish = wishlist.includes(it.id);
    const sold = it.quantity <= 0;
    return `
      <div class="block ${L.sz} ${L.c} ${sold?'sold-out':''}" data-id="${it.id}">
        <button class="heart-btn ${inWish?'on':''}" data-heart="${it.id}" title="${inWish?'移出心愿单':'加入心愿单'}">${inWish?'♥':'♡'}</button>
        <div class="stock ${sold?'out':''}">${sold? '售完' : '×'+it.quantity}</div>
        <div class="img-box"><img src="${it.imageUrl}" alt="${escHtml(it.name)}" loading="lazy"></div>
        <div class="info">
          <div class="name">${escHtml(it.name)}</div>
          <div class="price">${stickerFor(it.id)}${it.stickers}</div>
        </div>
      </div>
    `;
  }).join('');

  // click handlers
  grid.querySelectorAll('.block').forEach(b => {
    b.addEventListener('click', (e) => {
      if (e.target.closest('[data-heart]')) return;
      const id = b.dataset.id;
      if (b.classList.contains('sold-out')) {
        showToast('已经卖完啦～', '😢');
        return;
      }
      openModal(id);
    });
  });
  grid.querySelectorAll('[data-heart]').forEach(h => {
    h.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleWish(h.dataset.heart);
    });
  });
}

/* ============ RENDER HISTORY ============ */
function renderHistoryStats(){
  const stats = document.getElementById('historyStats');
  if (history.length === 0) { stats.innerHTML = ''; return; }
  const totalItems = history.reduce((s,h) => s + h.redeemedQty, 0);
  const totalSpent = history.reduce((s,h) => s + h.stickers * h.redeemedQty, 0);
  // most-redeemed item name
  const counts = {};
  history.forEach(h => { counts[h.name] = (counts[h.name]||0) + h.redeemedQty; });
  const fav = Object.entries(counts).sort((a,b) => b[1]-a[1])[0];
  const favShort = fav ? (fav[0].length > 10 ? fav[0].slice(0,9)+'…' : fav[0]) : '—';

function renderHistory(){
  renderHistoryStats();
  const grid = document.getElementById('historyGrid');
  if (history.length === 0) {
    grid.innerHTML = `<div class="h-empty">还没有兑换记录哦<br>去商店选一个心仪的奖励吧～ 🎁</div>`;
    return;
  }
  // sort desc
  const sorted = [...history].sort((a,b) => b.redeemedAt - a.redeemedAt);
  // group by month
  const groups = {};
  sorted.forEach(h => {
    const d = new Date(h.redeemedAt);
    const key = `${d.getFullYear()}年${d.getMonth()+1}月`;
    (groups[key] = groups[key] || []).push(h);
  });
  const html = Object.entries(groups).map(([month, arr]) => {
    return `<div class="h-month">${month}</div>` + arr.map(h => `
      <div class="h-card">
        <div class="h-badge">×${h.redeemedQty}</div>
        <div class="h-thumb"><img src="${h.imageUrl}" alt=""></div>
        <div style="flex:1;min-width:0">
          <div class="h-name">${escHtml(h.name)}</div>
          <div class="h-meta">兑换于 ${fmtAgo(h.redeemedAt)} · 花费 ${h.stickers * h.redeemedQty} ${stickerFor(h.id)}</div>
        </div>
      </div>
    `).join('');
  }).join('');
  grid.innerHTML = html;
}

/* ============ WISHLIST ============ */
function toggleWish(id){
  const i = wishlist.indexOf(id);
  if (i >= 0) wishlist.splice(i, 1);
  else wishlist.push(id);
  renderStore();
  renderWishlist();
  document.getElementById('wishCount').textContent = wishlist.length;
  saveState();
}

function moveWish(id, dir){
  const i = wishlist.indexOf(id);
  if (i < 0) return;
  const j = i + dir;
  if (j < 0 || j >= wishlist.length) return;
  [wishlist[i], wishlist[j]] = [wishlist[j], wishlist[i]];
  renderWishlist();
  saveState();
}

function renderWishlist(){
  const list = document.getElementById('wishList');
  document.getElementById('wishCount').textContent = wishlist.length;
  if (wishlist.length === 0) {
    list.innerHTML = `<div class="empty">还没有心愿～<br>点击商品上的♡把它加进来吧</div>`;
    return;
  }
  list.innerHTML = wishlist.map((id, idx) => {
    const it = items.find(x => x.id === id);
    if (!it) return '';
    return `
      <div class="wishlist-item">
        <div class="priority-num">${idx+1}</div>
        <div class="thumb"><img src="${it.imageUrl}" alt=""></div>
        <div class="wi-info">
          <div class="wi-name">${escHtml(it.name)}</div>
          <div class="wi-meta">${it.stickers} ★ · 库存 ${it.quantity}</div>
        </div>
        <div class="arrows">
          <button data-wish-up="${it.id}" title="上移">▲</button>
          <button data-wish-down="${it.id}" title="下移">▼</button>
        </div>
        <button class="remove" data-wish-remove="${it.id}">×</button>
      </div>
    `;
  }).join('');
  list.querySelectorAll('[data-wish-up]').forEach(b => b.addEventListener('click', () => moveWish(b.dataset.wishUp, -1)));
  list.querySelectorAll('[data-wish-down]').forEach(b => b.addEventListener('click', () => moveWish(b.dataset.wishDown, +1)));
  list.querySelectorAll('[data-wish-remove]').forEach(b => b.addEventListener('click', () => toggleWish(b.dataset.wishRemove)));
}

/* ============ MODAL ============ */
function openModal(id){
  const it = items.find(x => x.id === id);
  if (!it) return;
  pendingId = id;
  pendingQty = 1;
  renderModal();
  document.getElementById('modalBackdrop').classList.add('open');
}
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
  pendingId = null;
}
function renderModal(){
  const it = items.find(x => x.id === pendingId);
  if (!it) return;
  const total = it.stickers * pendingQty;
  const canAfford = balance >= total;
  const maxQty = it.quantity;
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <div class="m-top"><img src="${it.imageUrl}" alt=""></div>
    <div class="m-body">
      <h2>${escHtml(it.name)}</h2>
      <div class="price-tag">${stickerFor(it.id)} ${it.stickers} 贴纸/个</div>
      <div class="qty-row">
        <label>兑换数量</label>
        <div class="qty-ctrl">
          <button id="qtyMinus" ${pendingQty<=1?'disabled':''}>−</button>
          <div class="n">${pendingQty}</div>
          <button id="qtyPlus" ${pendingQty>=maxQty?'disabled':''}>+</button>
        </div>
      </div>
      <div class="total-row">
        <div class="lbl">总计花费</div>
        <div class="val">${total} ★</div>
      </div>
      ${!canAfford ? `<div style="text-align:center;color:#FF6B6B;font-size:16px;margin-bottom:14px">贴纸不够啦～还差 ${total - balance} 张</div>` : ''}
      <div class="m-actions">
        <button class="btn ghost" id="cancelBtn">取消</button>
        <button class="btn primary" id="confirmBtn" ${!canAfford?'disabled':''}>兑换！</button>
      </div>
    </div>
  `;
  document.getElementById('qtyMinus').onclick = () => { if (pendingQty>1){pendingQty--; renderModal();} };
  document.getElementById('qtyPlus').onclick  = () => { if (pendingQty<maxQty){pendingQty++; renderModal();} };
  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('confirmBtn').onclick = confirmRedeem;
}
function confirmRedeem(){
  const it = items.find(x => x.id === pendingId);
  if (!it) return;
  const total = it.stickers * pendingQty;
  if (balance < total) return;
  balance -= total;
  it.quantity -= pendingQty;
  history.unshift({
    id: 'local_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8),
    itemId: it.id,
    name: it.name,
    stickers: it.stickers,
    redeemedQty: pendingQty,
    imageUrl: it.imageUrl,
    redeemedAt: Date.now(),
  });
  // remove from wishlist if sold out
  if (it.quantity <= 0) {
    const wi = wishlist.indexOf(it.id);
    if (wi >= 0) wishlist.splice(wi, 1);
  }
  document.getElementById('stickerBalance').textContent = balance;
  burstConfetti();
  showToast(`兑换成功！${it.name}`, '🎉');
  closeModal();
  renderStore();
  renderHistory();
  renderWishlist();
  saveState();
}

/* ============ FX ============ */
function showToast(text, emoji = '✨'){
  const layer = document.getElementById('toastLayer');
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = `<span>${emoji}</span><span>${escHtml(text)}</span>`;
  layer.appendChild(t);
  setTimeout(() => t.remove(), 2400);
}
function burstConfetti(){
  const emojis = ['🎉','⭐','💛','❤️','✨','🎊','🧡'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 18; i++) {
    const span = document.createElement('span');
    span.className = 'burst';
    span.textContent = emojis[i % emojis.length];
    span.style.left = cx + 'px';
    span.style.top = cy + 'px';
    const angle = (Math.PI * 2 / 18) * i + Math.random()*0.5;
    const dist = 150 + Math.random() * 150;
    span.style.setProperty('--dx', (Math.cos(angle)*dist) + 'px');
    span.style.setProperty('--dy', (Math.sin(angle)*dist) + 'px');
    span.style.setProperty('--r', (Math.random()*540 - 270) + 'deg');
    document.body.appendChild(span);
    setTimeout(() => span.remove(), 1300);
  }
}

/* ============ REALTIME ============ */
let _refetchT = null;
function _scheduleRefetch(){
  if (_pushing) return;
  clearTimeout(_refetchT);
  _refetchT = setTimeout(async () => {
    try {
      await loadFromSupabase();
      renderStore(); renderHistory(); renderWishlist();
      document.getElementById('stickerBalance').textContent = balance;
      const pp = document.getElementById('parentPanel');
      if (pp && pp.classList.contains('open')) renderParentPanel();
    } catch (e) { console.error('refetch failed', e); }
  }, 250);
}
function subscribeRealtime(){
  sb.channel('store')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'items' },       _scheduleRefetch)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'wallet' },      _scheduleRefetch)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'wishlist' },    _scheduleRefetch)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'redemptions' }, _scheduleRefetch)
    .subscribe(status => {
      if (status === 'SUBSCRIBED') setSyncStatus('synced', '已同步');
      else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') setSyncStatus('offline', '离线');
    });
}

function onPinKey(k){
  if (k === 'clear') pinBuffer = '';
  else if (k === 'back') pinBuffer = pinBuffer.slice(0, -1);
  else if (pinBuffer.length < 4) pinBuffer += k;
  const dots = document.querySelectorAll('#pinDots .pd');
  dots.forEach((d,i) => {
    d.classList.remove('error');
    d.classList.toggle('filled', i < pinBuffer.length);
    d.textContent = i < pinBuffer.length ? '•' : '';
  });
  if (pinBuffer.length === 4) {
    setTimeout(() => {
      if (pinBuffer === pin) {
        closeModal();
        openParentPanel();
      } else {
        dots.forEach(d => d.classList.add('error'));
        setTimeout(() => { pinBuffer = ''; onPinKey('clear'); }, 500);
      }
    }, 150);
  }
}

/* ============ IMAGE PROCESSING (white → transparent) ============ */
function fileToDataUrl(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function stripWhiteBackground(dataUrl){
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => {
      const max = 600;
      const scale = Math.min(1, max / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const data = ctx.getImageData(0,0,w,h);
      const px = data.data;
      const high = 244, low = 220;
      for (let i = 0; i < px.length; i += 4) {
        const minRGB = Math.min(px[i], px[i+1], px[i+2]);
        if (minRGB > high) px[i+3] = 0;
        else if (minRGB > low) px[i+3] = Math.floor(255 * (1 - (minRGB - low) / (high - low)));
      }
      ctx.putImageData(data, 0, 0);
      res(canvas.toDataURL('image/png'));
    };
    img.onerror = rej;
    img.src = dataUrl;
  });
}
</script>
