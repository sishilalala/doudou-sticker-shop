[build]
  # Generate config.js from Netlify env vars (SUPABASE_URL, SUPABASE_ANON_KEY).
  # Set those two vars in: Site settings → Environment variables.
  command = "printf 'window.CONFIG = { SUPABASE_URL: %s, SUPABASE_ANON_KEY: %s };\\n' \"\\\"$SUPABASE_URL\\\"\" \"\\\"$SUPABASE_ANON_KEY\\\"\" > config.js"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
