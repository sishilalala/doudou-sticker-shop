<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>🏷️ 豆豆兑换商店</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #FF6B6B;
      --primary-light: #FF9B9B;
      --secondary: #FFB347;
      --gold: #e8a020;
      --gold-bg: #fff8e1;
      --green: #2d9e5a;
      --green-bg: #e6f9ee;
      --bg: #fff8f4;
      --card-bg: #ffffff;
      --text: #2d2d2d;
      --text-muted: #888;
      --border: #ffe4d0;
      --shadow: 0 4px 18px rgba(255,107,107,0.13);
      --shadow-hover: 0 8px 30px rgba(255,107,107,0.22);
      --radius: 16px;
    }
    body {
      font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,-apple-system,sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== Header ===== */
    .app-header {
      background: linear-gradient(160deg, #FF6B6B 0%, #FFB347 100%);
      color: #fff;
      padding: 20px 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }
    .app-header::before {
      content: ''; position: absolute; right: -30px; top: -30px;
      width: 160px; height: 160px; border-radius: 50%;
      background: rgba(255,255,255,.12); pointer-events: none;
    }
    .app-header::after {
      content: ''; position: absolute; left: -40px; bottom: -50px;
      width: 200px; height: 200px; border-radius: 50%;
      background: rgba(255,255,255,.08); pointer-events: none;
    }
    .app-header > * { position: relative; z-index: 1; }
    .app-header-title h1 { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
    .app-header-title p  { font-size: 11px; opacity: .8; margin-top: 2px; }
    .sync-chip {
      background: rgba(255,255,255,.22);
      border: 1.5px solid rgba(255,255,255,.5);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .sync-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6deba5;
      margin-right: 4px;
      vertical-align: middle;
    }
    .sync-dot.off { background: rgba(255,255,255,.45); }

    /* ===== Tabs ===== */
    nav {
      display: flex;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      position: sticky;
      top: 0;
      z-index: 30;
    }
    .tab-btn {
      flex: 1;
      padding: 13px 8px;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .2s;
    }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

    /* ===== Pages ===== */
    .page { display: none; }
    .page.active { display: block; }
    .grid-wrap { padding: 14px 14px 88px; max-width: 900px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    /* ===== Card ===== */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform .2s, box-shadow .2s;
    }
    .card:not(.card-history):hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .card-img {
      width: 100%; height: 120px;
      object-fit: cover;
      display: block;
    }
    .card-img-placeholder {
      width: 100%; height: 120px;
      background: linear-gradient(135deg, #FFE8D6, #FFD6E8);
      display: flex; align-items: center; justify-content: center;
      font-size: 38px;
    }
    .card-body { padding: 10px 10px 11px; }
    .card-name {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin-bottom: 6px; line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .sticker-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: var(--gold-bg); color: var(--gold);
      font-weight: 700; font-size: 12px;
      padding: 2px 8px; border-radius: 20px;
      margin-bottom: 7px;
    }
    .stock-badge {
      display: inline-flex; align-items: center; gap: 3px;
      background: #f0f7ff; color: #3a7bd5;
      font-weight: 600; font-size: 11px;
      padding: 2px 7px; border-radius: 20px;
      margin-bottom: 7px;
      margin-left: 4px;
    }
    .stock-badge.low { background: #fff5f0; color: #e05a2a; }
    .btn-redeem {
      width: 100%; padding: 7px 4px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; border: none; border-radius: 8px;
      font-family: inherit; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-redeem:active { opacity: .8; }

    /* Card delete button */
    .card-wrapper { position: relative; }
    .btn-delete-card {
      position: absolute; top: 6px; right: 6px;
      width: 24px; height: 24px;
      background: rgba(0,0,0,.45);
      border: none; border-radius: 50%;
      color: #fff; font-size: 13px; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .15s;
      z-index: 2;
    }
    .card-wrapper:hover .btn-delete-card { opacity: 1; }
    @media (hover: none) { .btn-delete-card { opacity: .7; } }

    /* ===== History card ===== */
    .card-history { opacity: .88; }
    .tag-redeemed {
      display: inline-block;
      background: var(--green-bg); color: var(--green);
      font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
      margin-bottom: 4px;
    }
    .redeemed-date { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

    /* History summary bar */
    #history-summary {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #history-summary .sum-label { font-size: 13px; opacity: .88; }
    #history-summary .sum-value { font-size: 22px; font-weight: 700; letter-spacing: .5px; }

    /* ===== Empty state ===== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center; padding: 50px 20px; color: var(--text-muted);
    }
    .empty-icon { font-size: 52px; margin-bottom: 10px; }
    .empty-state p { font-size: 15px; line-height: 1.6; }

    /* ===== FAB ===== */
    #fab {
      position: fixed; bottom: 22px; right: 22px;
      width: 56px; height: 56px; border-radius: 50%;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      color: #fff; font-size: 30px;
      border: none; cursor: pointer;
      box-shadow: 0 4px 18px rgba(255,107,107,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 20; transition: transform .15s;
    }
    #fab:active { transform: scale(.93); }

    /* ===== Overlay + Sheet ===== */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 50;
      align-items: flex-end; justify-content: center;
    }
    .overlay.show { display: flex; }
    @media (min-width: 600px) { .overlay { align-items: center; padding: 20px; } }
    .sheet {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 22px 20px 28px;
      width: 100%; max-width: 440px;
      animation: slideUp .25s ease;
      max-height: 92vh; overflow-y: auto;
    }
    @media (min-width: 600px) { .sheet { border-radius: 20px; } }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .sheet-drag { width: 40px; height: 4px; background: #e0e0e0; border-radius: 4px; margin: 0 auto 18px; }
    .sheet h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }

    /* Form */
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block; font-size: 11px; font-weight: 700;
      color: #666; margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .form-row input[type="text"],
    .form-row input[type="number"],
    .form-row input[type="url"] {
      width: 100%; padding: 10px 12px;
      border: 2px solid var(--border); border-radius: 10px;
      font-size: 15px; outline: none;
      transition: border-color .2s;
      font-family: inherit; color: var(--text);
    }
    .form-row input:focus { border-color: var(--primary); }
    .img-toggle { display: flex; gap: 8px; margin-bottom: 8px; }
    .img-toggle-btn {
      flex: 1; padding: 7px;
      border: 2px solid var(--border); background: #fff;
      border-radius: 8px; font-family: inherit;
      font-size: 12px; font-weight: 600;
      color: #888; cursor: pointer; transition: all .15s;
    }
    .img-toggle-btn.active { border-color: var(--primary); color: var(--primary); background: #fff3e0; }
    .file-drop-zone {
      display: block; padding: 12px 10px;
      border: 2px dashed var(--border); border-radius: 10px;
      text-align: center; font-size: 13px; color: #888;
      cursor: pointer; transition: border-color .2s;
    }
    .file-drop-zone:hover { border-color: var(--primary); }
    #inp-file { display: none; }
    #img-preview {
      width: 100%; max-height: 130px; object-fit: cover;
      border-radius: 10px; margin-top: 8px; display: none;
    }
    .sheet-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-cancel {
      flex: 1; padding: 11px;
      border: 2px solid var(--border); background: #fff;
      border-radius: 10px; font-family: inherit;
      font-size: 14px; font-weight: 600;
      color: #666; cursor: pointer;
    }
    .btn-primary {
      flex: 2; padding: 11px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; border: none; border-radius: 10px;
      font-family: inherit; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary:not(:disabled):active { opacity: .85; }

    /* Confirm sheet */
    .confirm-sheet { text-align: center; }
    .confirm-img-box {
      width: 90px; height: 90px; border-radius: 14px;
      overflow: hidden; margin: 0 auto 12px;
      background: linear-gradient(135deg, #FFE8D6, #FFD6E8);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px;
    }
    .confirm-img-box img { width: 100%; height: 100%; object-fit: cover; }
    .confirm-item-name { font-size: 17px; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .confirm-item-cost { font-size: 14px; color: var(--gold); font-weight: 600; margin-bottom: 8px; }
    .confirm-hint { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }

    /* Quantity stepper */
    .qty-stepper-row {
      margin: 4px 0 12px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .qty-stepper { display: flex; align-items: center; gap: 0; }
    .qty-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary); color: #fff;
      border: none; font-size: 22px; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: opacity .15s; user-select: none;
    }
    .qty-btn:disabled { opacity: .35; cursor: not-allowed; }
    .qty-btn:not(:disabled):active { opacity: .75; }
    .qty-display {
      width: 56px; text-align: center;
      font-size: 26px; font-weight: 700; color: var(--text);
    }
    .qty-remaining-label { font-size: 12px; color: var(--text-muted); }
    .qty-remaining-label strong { color: var(--primary); }

    /* Toast */
    #toast {
      position: fixed; bottom: 88px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(40,40,40,.92); color: #fff;
      padding: 9px 20px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
      opacity: 0; transition: opacity .25s, transform .25s;
      z-index: 200; pointer-events: none; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
      display: inline-block; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ===== Header ===== -->
<header class="app-header">
  <div class="app-header-title">
    <h1>🏷️ 豆豆兑换商店</h1>
    <p>积累贴纸 · 兑换好礼物</p>
  </div>
  <div class="sync-chip">
    <span class="sync-dot off" id="sync-dot"></span>
    <span id="sync-label">云同步</span>
  </div>
</header>

<!-- ===== Tabs ===== -->
<nav>
  <button class="tab-btn active" id="tab-catalog" onclick="switchTab('catalog')">🎁 兑换商店</button>
  <button class="tab-btn" id="tab-history" onclick="switchTab('history')">📋 兑换历史</button>
</nav>

<!-- ===== Catalog Page ===== -->
<div id="page-catalog" class="page active">
  <div class="grid-wrap">
    <div id="catalog-grid" class="grid"></div>
  </div>
</div>

<!-- ===== History Page ===== -->
<div id="page-history" class="page">
  <div class="grid-wrap">
    <div id="history-summary" style="display:none"></div>
    <div id="history-grid" class="grid"></div>
  </div>
</div>

<!-- ===== FAB ===== -->
<button id="fab" onclick="openAddModal()" title="添加新商品">＋</button>

<!-- ===== Add Item Modal ===== -->
<div class="overlay" id="overlay-add" onclick="overlayClick(event,'add')">
  <div class="sheet">
    <div class="sheet-drag"></div>
    <h2>✨ 添加新商品</h2>
    <div class="form-row">
      <label>商品名称 *</label>
      <input type="text" id="inp-name" placeholder="例如：乐高积木套装" />
    </div>
    <div class="form-row">
      <label>所需贴纸数量 *</label>
      <input type="number" id="inp-stickers" placeholder="例如：10" min="1" step="1" />
    </div>
    <div class="form-row">
      <label>库存数量（共几个）</label>
      <input type="number" id="inp-quantity" placeholder="例如：5，留空默认为 1" min="1" step="1" />
    </div>
    <div class="form-row">
      <label>商品图片（可选）</label>
      <div class="img-toggle">
        <button class="img-toggle-btn active" id="btn-type-url" onclick="setImgType('url')">🔗 网络链接</button>
        <button class="img-toggle-btn" id="btn-type-upload" onclick="setImgType('upload')">📷 本地图片</button>
      </div>
      <div id="sec-url">
        <input type="url" id="inp-url" placeholder="粘贴图片地址" oninput="onUrlInput()" />
      </div>
      <div id="sec-upload" style="display:none">
        <label class="file-drop-zone" for="inp-file" id="file-label">📁 点击选择图片</label>
        <input type="file" id="inp-file" accept="image/*" onchange="onFileSelect(event)" />
      </div>
      <img id="img-preview" alt="preview" />
    </div>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeAddModal()">取消</button>
      <button class="btn-primary" id="btn-save" onclick="saveItem()">添加商品</button>
    </div>
  </div>
</div>

<!-- ===== Confirm Redeem Modal ===== -->
<div class="overlay" id="overlay-confirm" onclick="overlayClick(event,'confirm')">
  <div class="sheet confirm-sheet">
    <div class="sheet-drag"></div>
    <h2>确认兑换？</h2>
    <div class="confirm-img-box" id="confirm-img-box">🎁</div>
    <p class="confirm-item-name" id="confirm-name"></p>
    <p class="confirm-item-cost" id="confirm-cost"></p>
    <div class="qty-stepper-row" id="qty-stepper-row" style="display:none">
      <div class="qty-stepper">
        <button class="qty-btn" id="qty-btn-minus" onclick="changeRedeemQty(-1)">−</button>
        <span class="qty-display" id="qty-display">1</span>
        <button class="qty-btn" id="qty-btn-plus" onclick="changeRedeemQty(1)">＋</button>
      </div>
      <p class="qty-remaining-label" id="qty-remaining-label"></p>
    </div>
    <p class="confirm-hint" id="confirm-hint">兑换后将移至历史记录</p>
    <div class="sheet-actions">
      <button class="btn-cancel" onclick="closeConfirmModal()">再想想</button>
      <button class="btn-primary" id="btn-do-redeem" onclick="executeRedeem()">🎉 确认兑换！</button>
    </div>
  </div>
</div>

<!-- ===== Toast ===== -->
<div id="toast"></div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<script>
/* ============================================================
   State
============================================================ */
let items   = [];
let history = [];
let pendingRedeemId  = null;
let pendingRedeemQty = 1;
let imgType      = 'url';
let uploadedData = null;

const SUPABASE_URL = 'https://agyzwlrnrqlxvegzlsvr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFneXp3bHJucnFseHZlZ3psc3ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNDMyMzIsImV4cCI6MjA4NzkxOTIzMn0.rWmKQFkwDVr9NHxQsrTLmtuqKrR95O03N6QWJYlchlo';
let sbClient  = null;
let sbChannel = null;

/* ============================================================
   Supabase helpers
============================================================ */
function rowToItem(row) {
  return {
    id: row.id, name: row.name, stickers: row.stickers,
    quantity: row.quantity ?? 1,
    imageUrl: row.image_url, imageData: row.image_data,
    createdAt: row.created_at, redeemedAt: row.redeemed_at,
    redeemedQty: row.redeemed_qty ?? 1
  };
}
function itemToRow(item) {
  return {
    id: item.id, name: item.name, stickers: item.stickers,
    quantity: item.quantity ?? 1,
    image_url: item.imageUrl || null, image_data: item.imageData || null,
    created_at: item.createdAt
  };
}
function histToRow(entry) {
  return {
    id: entry.id, name: entry.name, stickers: entry.stickers,
    redeemed_qty: entry.redeemedQty ?? 1,
    image_url: entry.imageUrl || null, image_data: entry.imageData || null,
    created_at: entry.createdAt, redeemed_at: entry.redeemedAt
  };
}

async function tryInitSupabase() {
  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    await loadFromSupabase();
    subscribeSupabase();
    setSyncIndicator(true);
  } catch(e) {
    console.warn('Supabase init failed', e);
    setSyncIndicator(false);
  }
}

async function loadFromSupabase() {
  const [r1, r2] = await Promise.all([
    sbClient.from('sticker_items').select('*').order('created_at'),
    sbClient.from('sticker_history').select('*').order('redeemed_at')
  ]);
  if (!r2.error) { history = (r2.data || []).map(rowToItem); renderHistory(); }
  if (!r1.error) {
    const sbItems = (r1.data || []).map(rowToItem);
    const sbIds   = new Set(sbItems.map(i => i.id));
    const histIds = new Set((r2.data || []).map(r => r.id));
    const missing = SEED_ITEMS.filter(i => !sbIds.has(i.id) && !histIds.has(i.id));
    if (missing.length > 0) {
      const localSaved = JSON.parse(localStorage.getItem('s_items') || '[]');
      const localById  = Object.fromEntries(localSaved.map(i => [i.id, i]));
      const missingWithLocal = missing.map(i => localById[i.id] || i);
      sbClient.from('sticker_items').upsert(missingWithLocal.map(itemToRow));
      items = [...sbItems, ...missingWithLocal];
    } else {
      items = sbItems;
    }
    renderCatalog();
  }
}

function subscribeSupabase() {
  if (sbChannel) sbChannel.unsubscribe();
  sbChannel = sbClient.channel('db-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sticker_items' },   () => loadFromSupabase())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sticker_history' }, () => loadFromSupabase())
    .subscribe();
}

function isSupabaseMode() { return !!sbClient; }

function setSyncIndicator(on) {
  document.getElementById('sync-dot').className = 'sync-dot' + (on ? '' : ' off');
  document.getElementById('sync-label').textContent = on ? '已同步' : '云同步';
}

/* ============================================================
   Local Storage
============================================================ */
function loadLocal() {
  try {
    items   = JSON.parse(localStorage.getItem('s_items')   || '[]');
    history = JSON.parse(localStorage.getItem('s_history') || '[]');
  } catch(e) { items = []; history = []; }
}
function saveLocal() {
  localStorage.setItem('s_items',   JSON.stringify(items));
  localStorage.setItem('s_history', JSON.stringify(history));
}

/* ============================================================
   CRUD
============================================================ */
async function addItem(item) {
  if (isSupabaseMode()) {
    const { error } = await sbClient.from('sticker_items').upsert(itemToRow(item));
    if (error) { showToast('❌ 添加失败，请重试'); throw error; }
  } else {
    items.push(item);
    saveLocal();
    renderCatalog();
  }
}

async function removeItem(id) {
  if (isSupabaseMode()) {
    const { error } = await sbClient.from('sticker_items').delete().eq('id', id);
    if (error) { showToast('❌ 删除失败，请重试'); return; }
  } else {
    items = items.filter(i => i.id !== id);
    saveLocal();
    renderCatalog();
  }
}

async function redeemItem(id, qty) {
  const item = items.find(i => i.id === id);
  if (!item) return false;

  const remaining = (item.quantity ?? 1) - qty;
  const histEntry = {
    id: genId(),
    name: item.name,
    stickers: item.stickers,
    redeemedQty: qty,
    imageUrl: item.imageUrl,
    imageData: item.imageData,
    createdAt: item.createdAt,
    redeemedAt: Date.now()
  };

  if (isSupabaseMode()) {
    history.push(histEntry);
    item.quantity = Math.max(0, remaining);
    saveLocal();
    renderCatalog();
    renderHistory();

    const histRow = histToRow(histEntry);
    let { error: histErr } = await sbClient.from('sticker_history').insert(histRow);
    if (histErr) {
      const fallback = { ...histRow };
      delete fallback.redeemed_qty;
      ({ error: histErr } = await sbClient.from('sticker_history').insert(fallback));
    }
    if (histErr) {
      history = history.filter(h => h.id !== histEntry.id);
      item.quantity = (item.quantity ?? 0) + qty;
      saveLocal();
      renderCatalog();
      renderHistory();
      showToast('❌ 兑换失败，请检查网络后重试');
      return false;
    }

    const { error: qtyErr } = await sbClient.from('sticker_items')
      .update({ quantity: Math.max(0, remaining) }).eq('id', id);
    if (qtyErr) console.error('Quantity update failed:', qtyErr.message);

    await loadFromSupabase();
  } else {
    history.push(histEntry);
    item.quantity = Math.max(0, remaining);
    saveLocal();
    renderCatalog();
    renderHistory();
  }
  return true;
}

/* ============================================================
   Image Handling
============================================================ */
function compressImage(file, maxSide = 600, quality = 0.75) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(maxSide / img.width, maxSide / img.height, 1);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function uploadImageToStorage(file, itemId) {
  if (!sbClient) return null;
  try {
    const path = `sticker_shop/${itemId}`;
    const { error } = await sbClient.storage.from('sticker-images').upload(path, file, { upsert: true });
    if (error) throw error;
    const { data } = sbClient.storage.from('sticker-images').getPublicUrl(path);
    return data.publicUrl;
  } catch(e) {
    console.warn('Storage upload failed', e);
    return null;
  }
}

/* ============================================================
   Render
============================================================ */
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return `${d.getMonth() + 1}/${d.getDate()}/${d.getFullYear()}`;
}

function imgHtml(item, placeholderEmoji = '🎁') {
  const src = item.imageData || item.imageUrl;
  if (src) {
    return `<img class="card-img" src="${escHtml(src)}" alt="" loading="lazy"
              onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'card-img-placeholder',textContent:'${placeholderEmoji}'}))">`;
  }
  return `<div class="card-img-placeholder">${placeholderEmoji}</div>`;
}

function renderCatalog() {
  const grid = document.getElementById('catalog-grid');
  const visible = items.filter(i => (i.quantity ?? 1) > 0);
  if (visible.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🎁</div>
      <p>还没有商品<br>点击右下角 ＋ 来添加吧！</p>
    </div>`;
    return;
  }
  grid.innerHTML = visible.map(item => {
    const qty = item.quantity ?? 1;
    const stockHtml = qty > 1
      ? `<span class="stock-badge${qty <= 2 ? ' low' : ''}">📦 剩余 ${qty}</span>`
      : '';
    return `
    <div class="card-wrapper">
      <div class="card">
        ${imgHtml(item)}
        <div class="card-body">
          <p class="card-name">${escHtml(item.name)}</p>
          <div>
            <span class="sticker-badge">⭐ ${item.stickers} 张</span>${stockHtml}
          </div>
          <button class="btn-redeem" onclick="openConfirmModal('${item.id}')">立刻兑换</button>
        </div>
      </div>
      <button class="btn-delete-card" onclick="deleteItem('${item.id}')" title="删除商品">✕</button>
    </div>`;
  }).join('');
}

function renderHistory() {
  const grid    = document.getElementById('history-grid');
  const summary = document.getElementById('history-summary');

  if (history.length === 0) {
    summary.style.display = 'none';
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <p>还没有兑换记录</p>
    </div>`;
    return;
  }

  const totalItems    = history.reduce((sum, i) => sum + (i.redeemedQty ?? 1), 0);
  const totalStickers = history.reduce((sum, i) => sum + (i.stickers || 0) * (i.redeemedQty ?? 1), 0);
  summary.style.display = 'flex';
  summary.innerHTML = `
    <div><div class="sum-label">🎉 共兑换 ${totalItems} 件商品</div></div>
    <div style="text-align:right">
      <div class="sum-label">累计消耗贴纸</div>
      <div class="sum-value">⭐ ${totalStickers} 张</div>
    </div>`;

  const sorted = [...history].sort((a, b) => b.redeemedAt - a.redeemedAt);
  grid.innerHTML = sorted.map(item => {
    const qty = item.redeemedQty ?? 1;
    const totalCost = item.stickers * qty;
    return `
    <div class="card-wrapper">
      <div class="card card-history">
        ${imgHtml(item)}
        <div class="card-body">
          <div class="tag-redeemed">✓ 已兑换${qty > 1 ? ' ' + qty + ' 个' : ''}</div>
          <p class="card-name">${escHtml(item.name)}</p>
          <div class="sticker-badge">⭐ ${totalCost} 张</div>
          <p class="redeemed-date">兑换于 ${fmtDate(item.redeemedAt)}</p>
        </div>
      </div>
      <button class="btn-delete-card" onclick="deleteHistoryItem('${item.id}')" title="删除记录">✕</button>
    </div>`;
  }).join('');
}

/* ============================================================
   Tab navigation
============================================================ */
function switchTab(tab) {
  ['catalog', 'history'].forEach(t => {
    document.getElementById(`page-${t}`).classList.toggle('active', t === tab);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  document.getElementById('fab').style.display = tab === 'catalog' ? '' : 'none';
  if (tab === 'history') renderHistory();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============================================================
   Add Item Modal
============================================================ */
function openAddModal() { resetAddForm(); showOverlay('add'); }
function closeAddModal() { hideOverlay('add'); }

function resetAddForm() {
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-stickers').value = '';
  document.getElementById('inp-quantity').value = '';
  document.getElementById('inp-url').value = '';
  document.getElementById('inp-file').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('file-label').textContent = '📁 点击选择图片';
  uploadedData = null;
  setImgType('url');
}

function setImgType(type) {
  imgType = type;
  document.getElementById('sec-url').style.display    = type === 'url'    ? '' : 'none';
  document.getElementById('sec-upload').style.display = type === 'upload' ? '' : 'none';
  document.getElementById('btn-type-url').classList.toggle('active', type === 'url');
  document.getElementById('btn-type-upload').classList.toggle('active', type === 'upload');
  document.getElementById('img-preview').style.display = 'none';
  uploadedData = null;
}

function onUrlInput() {
  const url = document.getElementById('inp-url').value.trim();
  const p = document.getElementById('img-preview');
  if (url) { p.src = url; p.style.display = 'block'; p.onerror = () => p.style.display = 'none'; }
  else p.style.display = 'none';
}

async function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const data = await compressImage(file);
  uploadedData = data;
  const p = document.getElementById('img-preview');
  p.src = data; p.style.display = 'block';
  document.getElementById('file-label').textContent = '✅ ' + file.name;
}

async function saveItem() {
  const name     = document.getElementById('inp-name').value.trim();
  const stickers = parseInt(document.getElementById('inp-stickers').value, 10);
  const qtyVal   = document.getElementById('inp-quantity').value.trim();
  const quantity = qtyVal ? parseInt(qtyVal, 10) : 1;
  if (!name)                  { showToast('请输入商品名称'); return; }
  if (!stickers || stickers < 1) { showToast('请输入有效的贴纸数量'); return; }
  if (quantity < 1)           { showToast('库存数量至少为 1'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const id = genId();
  let imageUrl  = null;
  let imageData = null;

  if (imgType === 'url') {
    imageUrl = document.getElementById('inp-url').value.trim() || null;
  } else if (uploadedData) {
    if (isSupabaseMode()) {
      const file = document.getElementById('inp-file').files[0];
      if (file) {
        const url = await uploadImageToStorage(file, id);
        if (url) imageUrl = url;
        else imageData = uploadedData;
      }
    } else {
      imageData = uploadedData;
    }
  }

  const item = { id, name, stickers, quantity, imageUrl, imageData, createdAt: Date.now() };

  try {
    await addItem(item);
    closeAddModal();
    showToast('🎉 商品已添加！');
  } catch(e) {
    // error toast already shown in addItem
  } finally {
    btn.disabled = false;
    btn.textContent = '添加商品';
  }
}

/* ============================================================
   Delete
============================================================ */
async function deleteItem(id) {
  const item = items.find(i => i.id === id);
  const name = item ? `「${item.name}」` : '这个商品';
  if (!confirm(`确定要删除 ${name} 吗？`)) return;
  await removeItem(id);
  showToast('商品已删除');
}

async function deleteHistoryItem(id) {
  const item = history.find(i => i.id === id);
  const name = item ? `「${item.name}」` : '这条兑换记录';
  if (!confirm(`确定要删除 ${name} 的兑换记录吗？`)) return;
  if (isSupabaseMode()) {
    const { error } = await sbClient.from('sticker_history').delete().eq('id', id);
    if (error) { showToast('❌ 删除失败，请重试'); return; }
  } else {
    history = history.filter(i => i.id !== id);
    saveLocal();
    renderHistory();
  }
  showToast('记录已删除');
}

/* ============================================================
   Redeem
============================================================ */
function openConfirmModal(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  pendingRedeemId  = id;
  pendingRedeemQty = 1;

  const box = document.getElementById('confirm-img-box');
  const src = item.imageData || item.imageUrl;
  if (src) {
    box.innerHTML = `<img src="${escHtml(src)}" alt="" onerror="this.parentElement.innerHTML='🎁'">`;
  } else {
    box.textContent = '🎁';
  }
  document.getElementById('confirm-name').textContent = item.name;

  const qty = item.quantity ?? 1;
  const stepperRow = document.getElementById('qty-stepper-row');
  if (qty > 1) {
    stepperRow.style.display = '';
    document.getElementById('qty-display').textContent = '1';
    updateConfirmCost(item, 1);
    updateStepperButtons(1, qty);
  } else {
    stepperRow.style.display = 'none';
    updateConfirmCost(item, 1);
  }
  document.getElementById('confirm-hint').textContent =
    qty <= 1 ? '兑换后将移至历史记录' : '兑换后库存将相应减少';

  showOverlay('confirm');
}

function updateConfirmCost(item, qty) {
  const totalCost = item.stickers * qty;
  document.getElementById('confirm-cost').textContent =
    qty > 1
      ? `⭐ 每个 ${item.stickers} 张 × ${qty} 个 = ${totalCost} 张贴纸`
      : `⭐ 需要 ${item.stickers} 张贴纸`;
  const remaining = (item.quantity ?? 1) - qty;
  const lbl = document.getElementById('qty-remaining-label');
  if (lbl) {
    lbl.innerHTML = remaining > 0
      ? `兑换后还剩 <strong>${remaining}</strong> 个`
      : `兑换后库存清零`;
  }
}

function updateStepperButtons(qty, max) {
  document.getElementById('qty-btn-minus').disabled = qty <= 1;
  document.getElementById('qty-btn-plus').disabled  = qty >= max;
}

function changeRedeemQty(delta) {
  const item = items.find(i => i.id === pendingRedeemId);
  if (!item) return;
  const max = item.quantity ?? 1;
  pendingRedeemQty = Math.max(1, Math.min(max, pendingRedeemQty + delta));
  document.getElementById('qty-display').textContent = pendingRedeemQty;
  updateConfirmCost(item, pendingRedeemQty);
  updateStepperButtons(pendingRedeemQty, max);
}

function closeConfirmModal() {
  hideOverlay('confirm');
  pendingRedeemId  = null;
  pendingRedeemQty = 1;
}

async function executeRedeem() {
  if (!pendingRedeemId) return;
  const btn = document.getElementById('btn-do-redeem');
  btn.disabled = true;
  const ok = await redeemItem(pendingRedeemId, pendingRedeemQty);
  btn.disabled = false;
  if (!ok) return;
  const qty = pendingRedeemQty;
  closeConfirmModal();
  showToast(qty > 1 ? `🎊 成功兑换 ${qty} 个！` : '🎊 兑换成功！已记录到历史');
}

/* ============================================================
   Overlay helpers
============================================================ */
function showOverlay(name) { document.getElementById(`overlay-${name}`).classList.add('show'); }
function hideOverlay(name) { document.getElementById(`overlay-${name}`).classList.remove('show'); }
function overlayClick(e, name) {
  if (e.target === document.getElementById(`overlay-${name}`)) {
    if (name === 'add')     closeAddModal();
    if (name === 'confirm') closeConfirmModal();
  }
}

/* ============================================================
   Utilities
============================================================ */
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
